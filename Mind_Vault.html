<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mind Vault.</title>
<style>
  :root {
    --ink: #E8E4DD;
    --cream: #0D0B0A;
    --cream-warm: #151311;
    --cream-muted: #4A4440;
    --sepia: #9A8B7A;
    --sepia-light: #B8AA99;
    --sepia-dim: rgba(154,139,122,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Hello', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── CANVAS ── */
  #canvas3d { position:fixed; inset:0; z-index:0; }

  /* ── TEXTURE LAYERS ── */
  #ink-texture {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    opacity:0; transition:opacity 3s ease;
    background-size:cover; background-position:center;
    mix-blend-mode:soft-light;
  }
  #ink-texture.loaded { opacity:0.14; }

  /* ── DEPTH FOG — microscope radial blur ── */
  .depth-fog {
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(ellipse 50% 50% at 50% 50%,
      rgba(13,11,10,0.0) 0%,
      rgba(13,11,10,0.0) 40%,
      rgba(13,11,10,0.45) 70%,
      rgba(13,11,10,0.88) 100%
    );
  }

  /* Fine grain */
  .grain {
    position:fixed; inset:0; pointer-events:none; z-index:3; opacity:0.022;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:160px 160px;
  }

  /* ── FLOATING TITLE ── */
  .logo {
    position:fixed; top:32px; left:36px; z-index:20;
    font-size:26px; letter-spacing:-.03em; color:var(--ink);
    opacity:0; font-weight:800; line-height:1.1;
    pointer-events:none;
    transition:opacity .8s ease, transform .8s ease;
    transform:translateY(-6px);
  }
  .logo.visible { opacity:.98; transform:translateY(0); }
  .title-word { pointer-events:auto; cursor:pointer; transition:opacity .25s ease; }
  .title-word:hover { opacity:.62; }
  .entropy-sequence {
    margin-top:10px;
    font-family:'SF Mono', ui-monospace, Menlo, monospace;
    font-size:18px; letter-spacing:.16em; color:var(--sepia);
    opacity:.42; pointer-events:auto; cursor:pointer; user-select:none;
    transition:opacity .35s ease, color .35s ease;
  }
  .entropy-sequence:hover { opacity:.75; }
  .entropy-sequence.in-call { opacity:1; color:var(--ink); }
  .entropy-sequence .entropy-step {
    display:inline-block; opacity:.28; transform:translateY(0);
    transition:opacity .18s ease, color .18s ease, transform .18s ease;
  }
  .entropy-sequence .entropy-step.lit {
    opacity:1; color:var(--ink); transform:translateY(-1px);
  }
  .entropy-sequence .entropy-arrow { opacity:.42; margin-left:2px; }
  .logo-dot {
    color:var(--sepia-light);
    pointer-events:auto;
    cursor:pointer;
    transition:opacity .3s ease;
    font-size:1.35em;
    line-height:0;
    margin-left:1px;
  }
  .logo-dot:hover { opacity:.6; }

  .header-right {
    position:fixed; top:32px; right:36px; z-index:20;
    display:flex; align-items:flex-end; gap:14px;
  }
  .stats { display:flex; gap:20px; align-items:flex-end; }
  .stat-pair { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .stat-n { font-size:22px; font-weight:700; color:var(--ink); letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums; }
  .stat-l { font-size:9px; letter-spacing:.08em; color:var(--sepia); opacity:.35; font-weight:500; text-transform:uppercase; }

  .live {
    position:fixed; bottom:32px; left:36px; z-index:20;
    display:flex; align-items:center; gap:7px;
  }
  .live-dot { width:5px; height:5px; border-radius:50%; background:var(--ink); opacity:.8; }
  .live-text { font-size:10px; letter-spacing:.04em; color:var(--sepia); opacity:.5; font-weight:500; }
  /* gear removed — settings accessed via logo-dot */

  /* ── VAULT LOADER ── */
  .vault-loader {
    position:fixed; inset:0; z-index:100;
    background:#0D0B0A;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; transition:opacity .8s ease;
    cursor:pointer;
  }
  .vault-loader.hidden { opacity:0; pointer-events:none; }

  .loader-title {
    font-size:32px; letter-spacing:-.02em; color:var(--ink); opacity:.95; font-weight:800;
    transition:all .8s ease;
  }
  .loader-dot {
    display:inline-block; cursor:pointer;
    transition:all .5s cubic-bezier(.4,0,.2,1);
    font-size:1.35em;
    line-height:0;
    margin-left:1px;
  }
  .loader-dot:hover { color:var(--green); }
  .loader-dot.morphing {
    transform: translateX(40px) rotate(-45deg);
    opacity:0;
  }
  .loader-title.fading {
    opacity:0;
    transform: none;
  }

  .loader-pulse {
    font-family:'SF Mono', ui-monospace, Menlo, monospace;
    font-size:14px; letter-spacing:.18em; color:var(--sepia);
    opacity:0; min-height:18px;
    transition: opacity .4s ease;
  }
  .loader-pulse.active { opacity:.34; }
  .loader-pulse.done { opacity:0; transition: opacity .3s ease; }

  .loader-progress {
    font-size:9px; letter-spacing:.25em; color:var(--sepia); opacity:.35;
    text-transform:uppercase; min-height:14px;
  }
  .loader-footer { display:none; }
  .loader-vault-btn {
    border:1px solid rgba(232,228,221,.14); background:rgba(154,139,122,.09);
    color:var(--ink); border-radius:999px; padding:9px 13px;
    font:600 11px/1 -apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
    letter-spacing:.04em; cursor:pointer; backdrop-filter:blur(10px);
  }
  .loader-vault-btn:hover { background:rgba(214,205,194,.18); }

  /* ── LEFT PANEL — Chat History ── */
  .chat-panel {
    position:fixed; bottom:90px; left:36px; z-index:20;
    width:340px; overflow-y:auto; scrollbar-width:none;
    display:none !important;
  }
  .chat-panel::-webkit-scrollbar { display:none; }
  /* Phone: chat fills bottom half; Mac: full height */
  @media (max-width: 768px) {
    .chat-panel {
      left:20px; right:20px; width:auto;
      bottom:80px;
      max-height:40vh;
    }
  }
  .chat-empty { font-size:11px; letter-spacing:.04em; color:var(--sepia); opacity:.25; }
  /* Single Q&A — no bubbles, one visible at a time */
  .chat-q {
    font-size:13px; letter-spacing:.01em; color:var(--ink); font-weight:500; line-height:1.5;
    opacity:0; transition:opacity .4s ease;
  }
  .chat-q.visible { opacity:.35; }
  .chat-q.fading { opacity:0; transition:opacity .6s ease; }
  .chat-a {
    font-size:14px; letter-spacing:.01em; color:var(--ink); font-weight:400; line-height:1.7;
    margin-top:8px; opacity:0; transition:opacity .5s ease .1s;
  }
  .chat-a.visible { opacity:.85; }
  .chat-sources {
    font-size:9px; letter-spacing:.06em; color:var(--sepia); opacity:.3;
    margin-top:6px;
  }

  /* ── CONVERSATION CONSTELLATION (right side) ── */
  .conv-constellation {
    position:fixed; right:0; top:0; width:320px; height:100%;
    z-index:10; pointer-events:none;
  }
  @media (max-width: 768px) {
    .conv-constellation { width:100%; height:55%; top:0; right:0; }
  }
  /* Vault portion indicator */
  .vault-portion {
    position:fixed; right:36px; top:64px; z-index:20;
    font-size:9px; letter-spacing:.08em; color:var(--sepia); opacity:0;
    transition:opacity .4s ease;
  }
  .vault-portion.visible { opacity:.45; }
  @media (max-width: 768px) {
    .vault-portion { right:20px; top:52px; }
  }

  /* ── RIGHT RESPONSE ── */
  .response-panel {
    position:fixed; right:0; top:50%; transform:translate(110%, -50%);
    z-index:20; width:min(340px, calc(100vw - 48px)); height:min(640px, 62vh); max-height:62vh;
    padding:22px 24px;
    background:rgba(13,11,10,.62);
    border:1px solid rgba(154,139,122,.12);
    border-right:none;
    border-radius:18px 0 0 18px;
    backdrop-filter: blur(18px);
    box-shadow:0 24px 80px rgba(0,0,0,.32);
    opacity:0; pointer-events:none;
    transition:transform .65s cubic-bezier(.2,.7,.1,1), opacity .45s ease;
    display:flex; flex-direction:column; overflow:hidden;
    overscroll-behavior:contain;
    touch-action:pan-y;
  }
  .response-panel.visible { transform:translate(0, -50%); opacity:1; pointer-events:auto; }
  .response-panel.collapsed { transform:translate(calc(100% - 42px), -50%); opacity:.78; pointer-events:auto; }
  .response-panel.collapsed .resp-body, .response-panel.collapsed .panel-footer, .response-panel.collapsed #panelActionBtn, .response-panel.collapsed #panelPaperNav { display:none !important; }
  .response-panel.collapsed .resp-head { writing-mode:vertical-rl; min-height:132px; margin:0; justify-content:center; }
  .response-panel.collapsed .panel-head-actions { writing-mode:horizontal-tb; flex-direction:column; }
  .resp-head {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    font-size:11px; letter-spacing:.08em; color:var(--sepia); opacity:.72; margin-bottom:14px; font-weight:600; flex:0 0 auto;
  }
  .panel-head-actions { display:flex; gap:7px; align-items:center; }
  .panel-paper-nav { display:none; }
  .panel-expand-btn, .panel-action-btn {
    width:30px; height:30px; border-radius:999px;
    border:1px solid rgba(232,228,221,.12);
    background:rgba(232,228,221,.045); color:rgba(232,228,221,.78);
    font-size:15px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .25s ease, transform .25s ease, color .25s ease;
  }
  .panel-action-btn { font-size:18px; font-weight:360; }
  .panel-collapse-btn { font-size:14px; }
  .panel-expand-btn:hover, .panel-action-btn:hover { background:rgba(232,228,221,.12); color:#fff; transform:translateY(-1px); }
  .resp-body {
    font-size:13px; line-height:1.8; color:var(--ink);
    font-weight:400; letter-spacing:.01em;
    flex:1; min-height:0; overflow-y:auto; scrollbar-width:none;
    overscroll-behavior:contain;
    touch-action:pan-y;
    -webkit-overflow-scrolling:touch;
  }
  .resp-body::-webkit-scrollbar { display:none; }
  .panel-title { font-size:24px; line-height:1.05; color:var(--ink); font-weight:780; letter-spacing:-.045em; margin-bottom:8px; }
  .panel-desc { font-size:13px; line-height:1.55; color:rgba(232,228,221,.68); margin-bottom:15px; }
  .panel-meta { font-size:10px; letter-spacing:.09em; color:var(--sepia); opacity:.58; margin-bottom:14px; text-transform:uppercase; }
  .panel-preview { font-size:13px; line-height:1.72; color:rgba(232,228,221,.72); padding-top:2px; }
  .panel-preview::-webkit-scrollbar { display:none; }
  .panel-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:17px; }
  .panel-footer { flex:0 0 auto; max-height:34%; overflow-y:auto; padding-top:14px; margin-top:14px; border-top:1px solid rgba(154,139,122,.10); background:linear-gradient(180deg, rgba(13,11,10,0), rgba(13,11,10,.2)); touch-action:pan-y; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .panel-footer::-webkit-scrollbar { display:none; }
  .panel-actions-footer { display:flex; gap:8px; flex-wrap:wrap; }
  .panel-actions .set-btn, .panel-actions-footer .set-btn { width:auto; padding:9px 14px; min-width:88px; background:rgba(154,139,122,.16); border:1px solid rgba(232,228,221,.08); }
  .panel-actions .set-btn:hover, .panel-actions-footer .set-btn:hover { background:rgba(214,205,194,.24); }
  .response-panel.expanded {
    left:50%; right:auto; top:50%;
    width:min(980px, calc(100vw - 56px)); height:min(820px, calc(100vh - 56px)); max-height:calc(100vh - 56px);
    transform:translate(-50%, -50%);
    border:1px solid rgba(232,228,221,.16);
    border-radius:24px;
    background:rgba(13,11,10,.88);
    box-shadow:0 30px 110px rgba(0,0,0,.66), inset 0 0 0 1px rgba(255,255,255,.025);
    z-index:75;
  }
  .response-panel.expanded.visible { transform:translate(-50%, -50%); }
  .response-panel.expanded .resp-body { padding-right:4px; }
  .thinking { color:var(--sepia); opacity:.5; font-size:12px; font-style:italic; letter-spacing:.04em; }
  .sources-sec { margin-top:12px; padding-top:11px; border-top:1px solid rgba(154,139,122,.08); }
  .src-label { font-size:9px; letter-spacing:.08em; color:var(--sepia); opacity:.35; margin-bottom:10px; font-weight:500; }
  .src-tag {
    display:inline-block; padding:5px 12px;
    background:rgba(154,139,122,.08); border:0; border-radius:999px;
    font-family:inherit; font-size:10px; letter-spacing:.02em; color:var(--sepia);
    margin:3px 3px 3px 0; cursor:pointer; transition:all .3s ease;
  }
  .src-tag:hover, .src-tag.hovering { background:rgba(139,92,246,.18); color:#F4EFFF; border-color:rgba(139,92,246,.34); box-shadow:0 0 18px rgba(139,92,246,.16); }
  .frontmatter-card {
    margin:0 0 12px;
    padding:0;
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  }
  .frontmatter-head {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin:7px 0 5px;
  }
  .frontmatter-label {
    font-size:9px; letter-spacing:.14em; text-transform:uppercase;
    color:rgba(201,191,175,.48); font-weight:720;
  }
  .frontmatter-count { font-size:10px; color:rgba(232,228,221,.30); }
  .frontmatter-grid, .frontmatter-featured { display:grid; grid-template-columns:1fr; gap:0; margin:0; }
  .frontmatter-prop, .obsidian-prop {
    min-width:0;
    display:grid; grid-template-columns:minmax(76px,.3fr) 1fr; gap:10px;
    padding:3px 0;
  }
  .frontmatter-prop.featured { background:transparent; }
  .obsidian-prop-key {
    font-size:9px; letter-spacing:.075em; text-transform:uppercase;
    color:rgba(120,230,140,.46); font-weight:650; margin:1px 0 0;
  }
  .obsidian-prop-key::before { content:'>'; color:rgba(201,191,175,.32); margin-right:4px; }
  .obsidian-prop-val { color:rgba(232,228,221,.82); overflow-wrap:anywhere; white-space:normal; font-size:11px; line-height:1.32; }
  .obsidian-prop-list { display:flex; flex-direction:column; gap:4px; }
  .obsidian-prop-list-item { color:rgba(232,228,221,.82); display:grid; grid-template-columns:minmax(70px,.3fr) 1fr; gap:8px; }
  .obsidian-prop-pill, .tag-filter-pill {
    display:inline-block; margin:0 5px 5px 0; padding:4px 8px; border-radius:999px;
    background:rgba(232,228,221,.075); border:1px solid rgba(232,228,221,.09);
    color:rgba(232,228,221,.82); font-size:11px; line-height:1.15;
  }
  .tag-filter-pill { cursor:pointer; font-family:inherit; transition:background .2s ease, border-color .2s ease, color .2s ease, transform .2s ease; }
  .tag-filter-pill:hover, .tag-filter-pill.active { background:rgba(120,230,140,.14); border-color:rgba(120,230,140,.34); color:#E9FFE8; transform:translateY(-1px); }
  .note-info-grid {
    display:flex; flex-wrap:wrap; gap:6px 10px; margin:0 0 12px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  }
  .note-info-card { display:inline-flex; gap:5px; align-items:baseline; min-width:0; }
  .note-info-k { font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:rgba(201,191,175,.42); }
  .note-info-v { font-size:11px; line-height:1.25; color:rgba(232,228,221,.74); overflow-wrap:anywhere; }
  .note-section { margin:0 0 16px; }
  .note-section-title { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:rgba(201,191,175,.45); margin:0 0 8px; }
  .note-heading-list { display:flex; flex-direction:column; gap:5px; }
  .note-heading-item { font-size:12px; color:rgba(232,228,221,.78); line-height:1.35; padding-left:10px; border-left:1px solid rgba(154,139,122,.18); }
  .note-pill-row { display:flex; flex-wrap:wrap; gap:5px; }
  .note-info-pill { display:inline-block; border:1px solid rgba(232,228,221,.08); border-radius:999px; background:rgba(232,228,221,.055); color:rgba(232,228,221,.76); padding:4px 8px; font-size:11px; }

  /* ── BOTTOM BAR ── thin line input + call button */
  .bottom-input {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:20;
    width:min(460px, calc(100vw - 120px));
    display:flex; align-items:center; gap:14px;
    opacity:0; pointer-events:none;
    transition:opacity .75s ease, transform .75s cubic-bezier(.2,.8,.2,1);
  }
  .bottom-input.visible { opacity:.82; pointer-events:auto; }
  .input-line {
    flex:1; position:relative;
    display:flex; align-items:center;
  }
  .input-line::after {
    content:''; position:absolute; left:0; right:0; bottom:0; height:1.5px;
    background:linear-gradient(90deg, transparent 0%, rgba(232,228,221,.78) 10%, rgba(154,139,122,.42) 50%, rgba(232,228,221,.78) 90%, transparent 100%);
    box-shadow:0 0 18px rgba(232,228,221,.08), inset 18px 0 18px rgba(13,11,10,.72), inset -18px 0 18px rgba(13,11,10,.72);
    transform-origin:left center; transform:scaleX(0);
    transition:transform 1.55s cubic-bezier(.16,.9,.18,1);
  }
  .bottom-input.visible .input-line::after { transform:scaleX(1); }
  .input-line::before {
    content:''; position:absolute; left:-24%; right:auto; bottom:0; width:22%; height:1.5px;
    background:linear-gradient(90deg, transparent, rgba(232,228,221,.95), rgba(154,139,122,.36), transparent);
    opacity:0; filter:blur(.15px);
    box-shadow:0 0 16px rgba(232,228,221,.18);
    transform:translateX(0);
  }
  .bottom-input.visible .input-line::before { animation:bottomLinePulse 5.6s cubic-bezier(.18,.72,.2,1) infinite; }
  @keyframes bottomLinePulse {
    0%, 54% { transform:translateX(0); opacity:0; }
    60% { opacity:.14; }
    72% { opacity:.9; }
    92% { opacity:.18; }
    100% { transform:translateX(560%); opacity:0; }
  }
  .input-field {
    width:100%; background:transparent; border:none; border-bottom:0;
    outline:none;
    font-family:inherit; font-size:14px; font-weight:400;
    color:var(--ink); letter-spacing:.01em;
    caret-color:var(--ink);
    padding:6px 0;
    transition:border-color .3s ease;
  }
  .input-field::placeholder { color:var(--sepia); opacity:.25; font-size:14px; letter-spacing:.01em; }
  .input-field:focus { border-bottom-color:rgba(154,139,122,.26); }
  /* Soundwave overlay — replaces border when in call */
  .wave-line {
    position:absolute; bottom:-1px; left:0; right:0; height:3px;
    background:rgba(154,139,122,.16);
    border-radius:999px;
    overflow:hidden;
    opacity:0; pointer-events:none;
    transition:opacity .3s ease, height .3s ease;
  }
  .wave-line::before {
    content:''; position:absolute; top:0; bottom:0; width:28%; left:-32%;
    background:linear-gradient(90deg, transparent, rgba(232,228,221,.86), rgba(154,139,122,.34), transparent);
    filter:blur(.2px);
  }
  .wave-line.active { opacity:1; }
  .wave-line.active::before { animation:linePulse 1.35s cubic-bezier(.22,.7,.22,1) infinite; }
  @keyframes linePulse { 0% { transform:translateX(0); opacity:.2; } 18% { opacity:1; } 100% { transform:translateX(480%); opacity:.25; } }
  .wave-line.speaking {
    height:24px; opacity:1;
    border-radius:12px;
    bottom:-11px;
  }
  .wave-canvas {
    position:absolute; inset:0;
    width:100%; height:100%;
  }
  /* Legacy entropy dots removed — ASCII sequence now lives under title */
  .entropy-indicator { display:none; }
  /* Phone: bottom bar and input adjustments */
  @media (max-width: 768px) {
    .bottom-input {
      bottom:24px;
      width:calc(100vw - 32px);
    }
    .input-field { font-size:16px; } /* Prevent iOS zoom on 16px+ */
    .logo { top:20px; left:20px; font-size:22px; }
    .header-right { top:20px; right:20px; }
    .stats { gap:14px; }
    .live { bottom:auto; top:20px; left:auto; right:20px; display:none; }
  }

  /* ── SECRET SETTINGS PANEL — same language as node side panel ── */
  .settings-panel {
    position:fixed; right:0; top:50%; transform:translate(110%, -50%);
    z-index:30; width:min(340px, calc(100vw - 48px)); max-height:72vh; overflow-y:auto;
    display:flex; flex-direction:column; gap:0;
    scrollbar-width:none;
    opacity:0; pointer-events:none;
    padding:22px 24px;
    background:rgba(13,11,10,.68);
    border:1px solid rgba(154,139,122,.12);
    border-right:none;
    border-radius:18px 0 0 18px;
    backdrop-filter: blur(18px);
    box-shadow:0 24px 80px rgba(0,0,0,.32);
    transition:transform .65s cubic-bezier(.2,.7,.1,1), opacity .45s ease;
  }

// ══════════════════════════════════════════════
// MARKDOWN PARSER
// ══════════════════════════════════════════════
function parseMDLinks(content) {
  const links = [];
  const re = /\[\[([^\]]+)\]\]/g;
  let m;
  while ((m = re.exec(content)) !== null) {
    links.push(m[1].split('|')[0].trim());
  }
  return links;
}

function noteStem(name) {
  return (name || '').split('/').pop().replace(/\.(md|txt)$/i, '').trim();
}
function linkVariants(target) {
  const raw = (target || '').replace(/#.*$/, '').trim();
  const stem = noteStem(raw);
  return [...new Set([raw, stem, raw.split('/').pop(), stem.split('/').pop()].filter(Boolean))];
}

function buildVaultFromNotes(notes) {
  // Exclude operational/boot/meta files from the constellation
  const EXCLUDED_NAMES = ['MEMORY', 'AGENTS', 'SOUL', 'IDENTITY', 'USER', 'TOOLS', 'HEARTBEAT', 'BOOTSTRAP'];
  
  const filtered = notes.filter(n => {
    const name = n.name || '';
    // Skip boot mirrors
    if (name.endsWith('-Boot')) return false;
    // Skip known boot files
    if (EXCLUDED_NAMES.includes(name)) return false;
    return true;
  });
  
  const nodeMap = {};
  const baseNodes = filtered.map((n, i) => ({
    id: i,
    name: n.name,
    content: n.content || '',
    path: n.path || '',
    size: Number.isFinite(n.size) ? n.size : null,
    modified: Number.isFinite(n.modified) ? n.modified : null,
    local: !!n.local,
    serverVault: n.serverVault || '',
    createdOrder: Number.isFinite(n.createdOrder) ? n.createdOrder : i,
    type: 'Note',
    category: n.category || 'Root',
    tags: extractHashtags(n.content || ''),
    links: parseMDLinks(n.content || ''),
    backlinks: [],
  }));

  baseNodes.forEach(nd => { nodeMap[nd.name] = nd; nodeMap[noteStem(nd.name)] = nd; if (nd.path) nodeMap[noteStem(nd.path)] = nd; });

  // Build directed links
  const links = [];
  baseNodes.forEach(nd => {
    nd.links.forEach(target => {
      const hitName = linkVariants(target).find(v => nodeMap[v]);
      if (hitName && nodeMap[hitName] && nodeMap[hitName].id !== nd.id) {
        links.push({ source: nd.id, target: nodeMap[hitName].id, kind: 'wikilink' });
        nodeMap[hitName].backlinks.push(nd.id);
      }
    });
  });

  // Category hubs make the vault structure visible: Research → every research file, etc.
  const uniqueTags = [...new Set(baseNodes.flatMap(nd => nd.tags || []))].sort();
  const categories = [...new Set(baseNodes.map(nd => nd.category || 'Root'))].sort();
  if (uniqueTags.length) categories.push('Tags');
  const categoryNodes = categories.map((cat, idx) => ({
    id: baseNodes.length + idx,
    name: cat,
    content: `${cat} category hub`,
    type: 'Category',
    category: cat,
    tags: [],
    links: [],
    backlinks: [],
    childCount: cat === 'Tags' ? uniqueTags.length : baseNodes.filter(nd => nd.category === cat).length,
    createdOrder: Math.min(...baseNodes.filter(nd => nd.category === cat || (cat === 'Tags' && nd.tags.length)).map(nd => nd.createdOrder), 9999),
  }));
  categoryNodes.forEach(catNode => {
    baseNodes.forEach(nd => {
      if (nd.category === catNode.name || (catNode.name === 'Tags' && nd.tags.length)) {
        links.push({ source: catNode.id, target: nd.id, kind: 'category' });
        nd.backlinks.push(catNode.id);
      }
    });
  });

  const rootId = baseNodes.length + categoryNodes.length;
  const vaultName = currentVaultName || DEFAULT_VAULT || 'Vault';
  const root = {
    id: rootId,
    name: vaultName,
    content: `${vaultName} root node`,
    type: 'Root',
    category: 'Root',
    tags: [], links: [], backlinks: [],
    childCount: categoryNodes.length,
    createdOrder: -1,
  };
  categoryNodes.forEach(catNode => {
    links.push({ source: rootId, target: catNode.id, kind: 'root' });
    catNode.backlinks.push(rootId);
  });

  VAULT.nodes = [...baseNodes, ...categoryNodes, root];
  rootNode = rootId;
  VAULT.noteCount = baseNodes.length;
  VAULT.links = links;
  VAULT.noteMap = nodeMap;
  const degree = new Array(VAULT.nodes.length).fill(0);
  links.forEach(l => { degree[l.source]++; degree[l.target]++; });
  VAULT.nodes.forEach((nd, idx) => { nd.degree = degree[idx]; });

  document.getElementById('sN').textContent = VAULT.noteCount;
  document.getElementById('sL').textContent = links.length;
  updateAdaptiveStats();
  setPaperCarouselIds([...Array(VAULT.noteCount).keys()].slice(0, Math.min(VAULT.noteCount, 80)), false, false);
}

async function parseLocalLinksProgressively(limit = Infinity) {
  if (!localFileMap || localFileMap.size === 0) return;
  const ids = VAULT.nodes.filter(n => n.local && !n._linksParsed).map(n => n.id);
  let parsed = 0;
  for (let i = 0; i < ids.length && parsed < limit; i++) {
    const id = ids[i];
    const nd = VAULT.nodes[id];
    if (!nd || !localFileMap.has(nd.path)) continue;
    try {
      nd.content = await localFileMap.get(nd.path).text();
      nd.tags = extractHashtags(nd.content);
      nd.links = parseMDLinks(nd.content);
      nd._linksParsed = true;
      nd.links.forEach(target => {
        const hitName = linkVariants(target).find(v => VAULT.noteMap[v]);
        const targetNode = hitName ? VAULT.noteMap[hitName] : null;
        if (targetNode && targetNode.id !== nd.id && !VAULT.links.some(l => l.source === nd.id && l.target === targetNode.id)) {
          VAULT.links.push({ source: nd.id, target: targetNode.id, kind: 'wikilink' });
          targetNode.backlinks.push(nd.id);
          nd.degree = (nd.degree || 0) + 1;
          targetNode.degree = (targetNode.degree || 0) + 1;
        }
      });
      parsed++;
      if (parsed % 25 === 0) {
        document.getElementById('sL').textContent = VAULT.links.length;
        await new Promise(r => setTimeout(r, 0));
      }
    } catch(e) {}
  }
  document.getElementById('sL').textContent = VAULT.links.length;
}

function guessType(name, content) {
  const c = content.toLowerCase();
  if (c.includes('#moc') || c.split('[[').length > 5) return 'MOC';
  if (c.includes('hypothesis') || c.includes('theory') || c.includes('posits')) return 'Theory';
  if (c.includes('study') || c.includes('research') || c.includes('experiment')) return 'Research';
  if (c.includes('concept') || c.includes('principle')) return 'Concept';
  return 'Note';
}

function extractHashtags(content) {
  const tags = [];
  const re = /#([a-zA-Z0-9_\-\/]+)/g;
  let m;
  while ((m = re.exec(content)) !== null) {
    tags.push(m[1].toLowerCase());
  }
  return [...new Set(tags)];
}

function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash % 360);
  return `hsl(${hue}, 60%, 58%)`;
}

const isLocal = location.hostname === '127.0.0.1' || location.hostname === 'localhost';

const MC_SERVER = isLocal ? `${BASE}:8787` : `${BASE}/mc`;
const RAG_SERVER = isLocal ? `${BASE}:8000` : `${BASE}/rag`;
const GEMINI_WS = null; // Gemini Live removed; Mind uses browser STT locally.
const MARP_SERVER = `${BASE}/marp`;
const LOCAL_VAULT_SERVER = `${BASE}/api/local-vault`;
const SCARLETT_LAB_SERVER = `${BASE}/api/scarlett-lab/ask`;
const DEFAULT_VAULT = 'Mission Control';
let currentVaultName = DEFAULT_VAULT;

async function loadVaultFromServer() {
  currentVaultName = DEFAULT_VAULT;
  try {
    const treeRes = await fetch(`${MC_SERVER}/api/vault/tree`);
    const treeData = await treeRes.json();
    const files = (treeData.files || []).filter(f => {
      if (!f.name || !(f.name.endsWith('.md') || f.name.endsWith('.txt'))) return false;
      const p = f.path || '';
      if (p.startsWith('Alfred/') || p.startsWith('memory/') || p.startsWith('Archive/')) return false;
      return true;
    });
    const notes = files.map((f, idx) => {
      const category = (f.path || '').includes('/') ? (f.path || '').split('/')[0] : 'Root';
      return { name: f.name.replace(/\.(md|txt)$/, ''), content: '', path: f.path || '', category, createdOrder: idx, size: f.size || null, modified: f.modified || null };
    });
    buildVaultFromNotes(notes);
    console.log(`[vault] Loaded ${notes.length} note shells; content is lazy-loaded on demand.`);
  } catch(e) {
    console.error('Vault server error:', e);
  }
}


async function loadServerVault(vaultKey) {
  const key = vaultKey || 'mission-control';
  currentVaultName = key === 'mission-control' ? DEFAULT_VAULT : key;
  const res = await fetch(`${LOCAL_VAULT_SERVER}/tree?vault=${encodeURIComponent(key)}`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Vault load failed');
  const files = data.files || [];
  const notes = files.map((f, idx) => {
    const category = (f.path || '').includes('/') ? (f.path || '').split('/')[0] : 'Root';
    return { name: f.name.replace(/\.(md|txt)$/i, ''), content: '', path: f.path || '', category, createdOrder: idx, serverVault:key, size: f.size || null, modified: f.modified || null };
  });
  buildVaultFromNotes(notes);
  lastVaultDiagnostics = {
    selectedRoot: key,
    vaultName: currentVaultName,
    totalFiles: files.length,
    mdFiles: files.length,
    acceptedNotes: notes.length,
    ignored: 0,
    categories: [...new Set(notes.map(n => n.category))].sort(),
    nodeCount: VAULT.nodes.length,
    linkCount: VAULT.links.length,
    rootNode,
  };
  window.lastVaultDiagnostics = lastVaultDiagnostics;
  vaultLoaded = true;
  openLoadedLocalVaultNow();
}

async function loadNamedVault(event, vaultKey) {
  event?.stopPropagation?.();
  const pulse = document.getElementById('loaderPulse');
  if (pulse) { pulse.classList.add('active'); pulse.textContent = `loading ${vaultKey}`; }
  try {
    await loadServerVault(vaultKey);
  } catch(e) {
    console.error('[vault] named load failed', e);
    if (pulse) pulse.textContent = 'vault load failed';
  }
}

async function ensureNodeContent(id) {
  const nd = VAULT.nodes[id];
  if (!nd || nd.type === 'Category' || nd.content) return nd?.content || '';
  if (!nd.path) return '';
  try {
    if (nd.local && localFileMap.has(nd.path)) {
      nd.content = await localFileMap.get(nd.path).text();
    } else if (nd.serverVault) {
      const res = await fetch(`${LOCAL_VAULT_SERVER}/file?vault=${encodeURIComponent(nd.serverVault)}&path=${encodeURIComponent(nd.path)}`);
      const data = await res.json();
      nd.content = data.content || '';
    } else {
      const res = await fetch(`${MC_SERVER}/api/vault/file?path=${encodeURIComponent(nd.path)}`);
      const data = await res.json();
      nd.content = data.content || '';
    }
    nd.tags = extractHashtags(nd.content);
    nd.filterTags = extractAllNodeTags(nd.content);
    nd.filterTags.forEach(tag => addToTagIndex(tag, nd.id));
    nd.links = parseMDLinks(nd.content);
    nd.links.forEach(target => {
      const hitName = linkVariants(target).find(v => VAULT.noteMap[v]);
      const targetNode = hitName ? VAULT.noteMap[hitName] : null;
      if (targetNode && targetNode.id !== nd.id && !VAULT.links.some(l => l.source === nd.id && l.target === targetNode.id)) {
        VAULT.links.push({ source: nd.id, target: targetNode.id, kind: 'wikilink' });
        targetNode.backlinks.push(nd.id);
        nd.degree = (nd.degree || 0) + 1;
        targetNode.degree = (targetNode.degree || 0) + 1;
      }
    });
    return nd.content;
  } catch(e) {
    console.warn('[vault] lazy content failed', e);
    return '';
  }
}


const localFileMap = new Map();
let lastVaultDiagnostics = null;
async function loadFiles(files) {
  const notes = [];
  localFileMap.clear();
  let i = 0;
  const allFiles = Array.from(files || []);
  const mdFiles = allFiles.filter(file => file.name && /\.(md|txt)$/i.test(file.name));
  const firstParts = (mdFiles[0]?.webkitRelativePath || '').split('/').filter(Boolean);
  const selectedRoot = firstParts.length ? firstParts[0] : '';
  currentVaultName = selectedRoot || 'Local Vault';
  const TECH_JUNK = new Set(['.obsidian', '.smart-env', '.git', 'node_modules', '.mind-vault']);
  const isMissionControl = /mission control/i.test(selectedRoot);
  let ignored = 0;

  for (const file of mdFiles) {
    const rawRel = file.webkitRelativePath || file.name;
    const rawParts = rawRel.split('/').filter(Boolean);
    const parts = selectedRoot && rawParts[0] === selectedRoot ? rawParts.slice(1) : rawParts;
    if (!parts.length) { ignored++; continue; }
    if (parts.some(part => TECH_JUNK.has(part))) { ignored++; continue; }
    if (isMissionControl && ['Alfred', 'Archive', 'memory'].includes(parts[0])) { ignored++; continue; }

    const rel = parts.join('/');
    const name = file.name.replace(/\.(md|txt)$/i, '');
    const category = parts.length > 1 ? parts[0] : 'Root';
    localFileMap.set(rel, file);
    // Metadata-first: content and links are lazy-read later so large vaults open fast.
    notes.push({ name, content: '', path: rel, category, createdOrder: i++, local: true, size: file.size || null, modified: file.lastModified || null });
  }

  buildVaultFromNotes(notes);
  lastVaultDiagnostics = {
    selectedRoot,
    vaultName: currentVaultName,
    totalFiles: allFiles.length,
    mdFiles: mdFiles.length,
    acceptedNotes: notes.length,
    ignored,
    categories: [...new Set(notes.map(n => n.category))].sort(),
    nodeCount: VAULT.nodes.length,
    linkCount: VAULT.links.length,
    rootNode,
  };
  window.lastVaultDiagnostics = lastVaultDiagnostics;
  window.vaultDebugSnapshot = () => ({
    diagnostics: lastVaultDiagnostics,
    visual: {
      nodes2d: nodes2d.length,
      visible: nodes2d.filter(n => isVisibleNode(n)).length,
      drawable: nodes2d.filter(n => isVisibleNode(n) && Number.isFinite(n.px) && Number.isFinite(n.py)).length,
      initialVaultMode,
      vaultBloomStarted,
      camZoom,
      camPan,
      main: [...mainSet],
      activeSize: activeSet.size,
    }
  });

  console.log(`[vault] Loaded local vault shells: ${notes.length}`, lastVaultDiagnostics);
  setTimeout(() => parseLocalLinksProgressively(300), 900);

  // Deterministic personal-vault path: after choosing a folder, always show the graph.
  requestAnimationFrame(() => openLoadedLocalVaultNow());
}

function chillGraphMode() {

function chillRevealLimit() {
  if (!vaultBloomStarted) return CHILL_GRAPH_INITIAL_NOTES;
  const elapsed = performance.now() - bloomStartedAt;
  return Math.min(CHILL_GRAPH_MAX_NOTES, Math.floor(CHILL_GRAPH_INITIAL_NOTES + elapsed / 220));

function isVisibleNode(nd) {
  if (!nd) return false;
  if (nd.type === 'Root') return true;
  if (initialVaultMode) return false;
  if (nd.type === 'Category') return true;
  if (chillGraphMode()) {
    if (mainSet.has(nd.id) || activeSet.has(nd.id) || currentFrameSet.has(nd.id) || pinnedSet.has(nd.id)) return true;
    if (activeTagFilters.size) return false;
    if (hoveredId !== null && connectedNodeIds(hoveredId).has(nd.id)) return true;
    return (nd.createdOrder || 0) <= chillRevealLimit();
  }
  const revealLimit = vaultBloomStarted ? Math.floor((performance.now() - bloomStartedAt) / 18) : Infinity;
  const progressive = (nd.createdOrder || 0) <= revealLimit;
  return progressive || expandedCategories.has(nd.category) || activeSet.has(nd.id) || pinnedSet.has(nd.id);
}

function isNodeRevealed(nd) {
  if (!nd) return false;
  if (nd.type === 'Category') return true;

function resetNodeToHome(nd) {

function stabilizeNode(nd) {
  if (!nd) return;
  if (![nd.ox, nd.oy, nd.oz, nd.vx, nd.vy, nd.vz].every(Number.isFinite)) resetNodeToHome(nd);
  const limit = Math.max(1200, Math.min(W || 1400, H || 1000) * 1.6);
  nd.ox = Math.max(-limit, Math.min(limit, nd.ox));
  nd.oy = Math.max(-limit, Math.min(limit, nd.oy));
  nd.oz = Math.max(-limit, Math.min(limit, nd.oz || 0));
  nd.vx = Math.max(-18, Math.min(18, nd.vx || 0));
  nd.vy = Math.max(-18, Math.min(18, nd.vy || 0));
  nd.vz = Math.max(-8, Math.min(8, nd.vz || 0));
}

function stabilizeCamera() {
  const limit = Math.max(2400, Math.min(W || 1400, H || 1000) * 3);
  const bad = ![camPan.x, camPan.y, camTargetPan.x, camTargetPan.y, camZoom, camTargetZoom].every(Number.isFinite)

    || Math.abs(camTargetPan.x) > limit || Math.abs(camTargetPan.y) > limit
    || camZoom <= 0 || camZoom > 12 || camTargetZoom <= 0 || camTargetZoom > 12;

  const anchorId = centerNodeId ?? (typeof rootNode === 'number' ? rootNode : VAULT.nodes.findIndex(n => n.type === 'Root'));

function carouselWrappedRel(idx, pos) {
  let rel = idx - pos;
  const len = paperCarouselIds.length || 1;
  while (rel > len / 2) rel -= len;
  while (rel < -len / 2) rel += len;
  return rel;
}

function syncCarouselIndexFromPosition(updateViewer = true) {
  if (!paperCarouselIds.length) return;
  const len = paperCarouselIds.length;
  paperCarouselPosition = ((paperCarouselPosition % len) + len) % len;
  const next = Math.round(paperCarouselPosition) % len;
  if (next !== paperCarouselIndex) {
    paperCarouselIndex = next;
    if (updateViewer) updateMiddleViewer(paperCarouselIds[paperCarouselIndex]);
  }
}

function renderPaperCarousel() {
  const wrap = document.getElementById('paperCarousel');
  const track = document.getElementById('paperTrack');
  const count = document.getElementById('paperCount');
  if (!wrap || !track || !count) return;
  const panel = document.getElementById('respPanel');
  if (!paperCarouselIds.length || !paperCarouselArmed) {
    wrap.classList.remove('visible');
    document.getElementById('middleViewer')?.classList.remove('visible');
    track.innerHTML = ''; count.textContent = '';
    panel?.classList.remove('has-paper-nav'); updateAdaptiveStats(); return;
  }
  wrap.classList.add('visible');
  document.getElementById('middleViewer')?.classList.remove('visible');
  panel?.classList.add('has-paper-nav');
  syncCarouselIndexFromPosition(false);
  const radiusX = Math.min(320, Math.max(150, (wrap.clientWidth || 700) * .34));
  const cards = [];
  const seen = new Set();
  for (let offset = -7; offset <= 7; offset++) {
    const idx = ((Math.round(paperCarouselPosition) + offset) % paperCarouselIds.length + paperCarouselIds.length) % paperCarouselIds.length;
    if (seen.has(idx)) continue;
    seen.add(idx);
    const id = paperCarouselIds[idx];
    const nd = VAULT.nodes[id];
    if (!nd) continue;
    const rel = carouselWrappedRel(idx, paperCarouselPosition);
    if (Math.abs(rel) > 7.2) continue;
    const angle = rel * 18;
    const x = Math.sin(angle * Math.PI / 180) * radiusX;
    const z = Math.cos(angle * Math.PI / 180) * 128 - 128;
    const y = Math.abs(rel) * 3.2;
    const scale = Math.abs(rel) < .5 ? 1 : Math.max(.54, 1 - Math.abs(rel) * .075);
    const opacity = Math.abs(rel) < .5 ? 1 : Math.max(.20, 1 - Math.abs(rel) * .13);
    const rot = Math.abs(rel) < .5 ? 0 : -angle * .72;
    const front = Math.abs(rel) < .5 ? ' front' : '';
    cards.push(`<button class="paper-card${front}" data-paper-id="${id}" onclick="selectPaper(${id}, event)" style="transform:translate(-50%,-50%) translateX(${x}px) translateY(${y}px) translateZ(${z}px) rotateY(${rot}deg) scale(${scale}); opacity:${opacity}; filter:blur(${Math.max(0, Math.abs(rel)-4)*.35}px); z-index:${100-Math.round(Math.abs(rel)*10)}"><div class="paper-kicker">${escapeHtml(VAULT.nodes[id].category || 'file')}</div><div class="paper-title">${escapeHtml(nd.name)}</div></button>`);
  }
  track.innerHTML = cards.join('');
  count.textContent = `${paperCarouselIndex + 1} / ${paperCarouselIds.length}`;
  updateAdaptiveStats();
}

function stepPaperCarousel(delta, event) {
  event?.stopPropagation?.();
  if (!paperCarouselIds.length) return;
  paperCarouselIndex = (paperCarouselIndex + delta + paperCarouselIds.length) % paperCarouselIds.length;
  paperCarouselPosition = paperCarouselIndex;
  paperCarouselVelocity = 0;
  renderPaperCarousel();
  const id = currentPaperId();
  if (id != null) focusOnNode(id);
}

function animatePaperCarousel() {
  if (!paperCarouselAnimating) return;
  if (!paperCarouselIds.length) { paperCarouselAnimating = false; return; }
  paperCarouselPosition += paperCarouselVelocity;
  paperCarouselVelocity *= .92;
  if (Math.abs(paperCarouselVelocity) < .003) {
    const target = Math.round(paperCarouselPosition);
    paperCarouselPosition += (target - paperCarouselPosition) * .22;
    if (Math.abs(target - paperCarouselPosition) < .01) {
      paperCarouselPosition = target;
      paperCarouselAnimating = false;
    }
  }
  syncCarouselIndexFromPosition(true);
  renderPaperCarousel();
  if (paperCarouselAnimating) requestAnimationFrame(animatePaperCarousel);
}

function startPaperCarouselAnimation() {
  if (!paperCarouselAnimating) { paperCarouselAnimating = true; requestAnimationFrame(animatePaperCarousel); }
}

function setupPaperCarouselInput() {
  const wrap = document.getElementById('paperCarousel');
  if (!wrap) return;
  wrap.addEventListener('wheel', e => {
    e.preventDefault(); e.stopPropagation();
    const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    paperCarouselVelocity += Math.max(-.55, Math.min(.55, delta / 240));
    startPaperCarouselAnimation();
  }, { passive:false });
  wrap.addEventListener('pointerdown', e => {
    paperDragStartX = e.clientX; paperDragLastX = e.clientX; paperDragLastT = performance.now(); paperDragStartIndex = paperCarouselIndex;
    paperCarouselVelocity = 0; wrap.classList.add('dragging'); wrap.setPointerCapture?.(e.pointerId);
  });
  wrap.addEventListener('pointermove', e => {
    if (paperDragStartX == null) return;
    e.preventDefault(); e.stopPropagation();
    const now = performance.now();
    const dx = e.clientX - paperDragLastX;
    const dt = Math.max(8, now - paperDragLastT);
    paperCarouselPosition -= dx / 92;
    paperCarouselVelocity = -(dx / dt) * 1.35;
    paperDragLastX = e.clientX; paperDragLastT = now;
    syncCarouselIndexFromPosition(true); renderPaperCarousel();
  }, { passive:false });
  const endDrag = e => {
    if (paperDragStartX == null) return;
    paperDragStartX = null; paperDragLastX = null; wrap.classList.remove('dragging');
    wrap.releasePointerCapture?.(e.pointerId);
    startPaperCarouselAnimation();
  };
  wrap.addEventListener('pointerup', endDrag);
  wrap.addEventListener('pointercancel', endDrag);
}

function initNodes() {
  const n = VAULT.nodes.length;
  if (n === 0) return;

  const R = Math.min(W, H) * 0.29;
  const categoryNodes = VAULT.nodes.filter(n => n.type === 'Category');
  const categoryCount = Math.max(1, categoryNodes.length);
  const categoryRank = Object.fromEntries(categoryNodes.map((nd, idx) => [nd.name, idx]));
  const siblingsByCategory = {};
  VAULT.nodes.slice(0, VAULT.noteCount).forEach(nd => {
    const key = nd.category || 'Root';
    (siblingsByCategory[key] ||= []).push(nd.id);
    if (nd.tags && nd.tags.length) (siblingsByCategory.Tags ||= []).push(nd.id);
  });
  Object.values(siblingsByCategory).forEach(ids => ids.sort((a, b) => (VAULT.nodes[a].createdOrder ?? a) - (VAULT.nodes[b].createdOrder ?? b)));
  const ordered = [...VAULT.nodes].sort((a, b) => (a.createdOrder ?? a.id) - (b.createdOrder ?? b.id));
  const appearRank = new Map(ordered.map((nd, idx) => [nd.id, idx]));

  const nodes = VAULT.nodes.map((nd, i) => {
    const isCategory = nd.type === 'Category';
    const isRoot = nd.type === 'Root';
    const categoryIndex = isCategory ? (categoryRank[nd.name] ?? 0) : (categoryRank[nd.category] ?? 0);
    const categoryAngle = (categoryIndex / categoryCount) * Math.PI * 2 - Math.PI / 2;
    const hemi = categoryIndex % 2 === 0 ? -1 : 1;
    const brainY = Math.sin(categoryIndex * 1.37) * R * 0.18;
    const lobeX = hemi * R * (0.16 + (categoryIndex % 5) * 0.045);
    const lobeZ = Math.cos(categoryIndex * 0.91) * R * 0.26;
    const branchStep = R * 0.12;
    let ox = isRoot ? 0 : lobeX;
    let oy = isRoot ? 0 : brainY;
    let ozBase = isRoot ? 0 : lobeZ;
    if (isCategory) {
      ox = lobeX * 0.9;
      oy = brainY * 0.75;
      ozBase = lobeZ * 0.85;
    }
    if (!isCategory && !isRoot) {
      const siblings = siblingsByCategory[nd.category] || [nd.id];
      const siblingIndex = Math.max(0, siblings.indexOf(nd.id));
      const segment = Math.floor(siblingIndex / 6);
      const local = siblingIndex % 6;
      const seed = Math.sin((siblingIndex + 1) * 12.9898 + categoryIndex * 78.233) * 43758.5453;
      const rnd = seed - Math.floor(seed);
      const airway = categoryAngle + Math.sin(segment * .7 + categoryIndex) * 0.55;
      const rawReach = branchStep * (1 + segment * 0.42);
      const reach = VAULT.nodes.length > 700 ? Math.min(rawReach, R * 1.18) : rawReach;
      const grape = 14 + local * 3.2;
      ox = lobeX + Math.cos(airway) * reach + Math.cos(local * 2.2 + rnd) * grape;
      oy = brainY + Math.sin(segment * 0.63 + local) * R * 0.045 + Math.sin(local * 1.7) * grape;
      ozBase = lobeZ + Math.sin(airway * 1.4 + local) * reach * 0.72 + (rnd - .5) * R * 0.16;
    }
    return ({
      ...nd,
      ox, oy, oz: ozBase,
      vx: 0, vy: 0, vz: 0,
      px: 0, py: 0,
      r: isRoot ? 18 : 3.8 + Math.min(14, Math.sqrt(Math.max(1, nd.degree || 1)) * 1.75),
      gp: Math.random() * Math.PI * 2,
      appearDelay: isRoot ? 0 : ((Math.sqrt(ox*ox + oy*oy) / Math.max(R,1)) * 3.9 + (nd.createdOrder || 0) * (VAULT.nodes.length > 700 ? 0.006 : 0.028) + (isCategory ? 0.35 : 1.25)),
      appearDur: 4.2 + Math.random() * 1.7,
      appearOx: (Math.random() - .5) * 96,
      appearOy: (Math.random() - .5) * 96,
    });
  });

  const { idealLen, repulse, spring, gravity } = forceSettings;
  const damping = .88;

  const forceSteps = n > 700 ? 0 : n > 650 ? 18 : 120;
  const doPairRepulsion = n <= 650;
  for (let step = 0; step < forceSteps; step++) {
    // Repulsion — disabled for huge vaults; category/link springs still shape the field.
    if (doPairRepulsion) for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        let dx = nodes[i].ox - nodes[j].ox;
        let dy = nodes[i].oy - nodes[j].oy;
        let d2 = dx * dx + dy * dy;
        if (d2 < 1) d2 = 1;
        const rep = (nodes[i].type === 'Category' || nodes[j].type === 'Category') ? repulse * 0.8 : repulse * 0.42;
        let f = rep / d2;
        let d = Math.sqrt(d2);
        dx /= d; dy /= d;
        nodes[i].vx += dx * f; nodes[i].vy += dy * f;
        nodes[j].vx -= dx * f; nodes[j].vy -= dy * f;
      }
    }
    // Spring attraction along links — category links form flower petals
    VAULT.links.forEach(link => {
      const a = link.source, b = link.target;
      if (!nodes[a] || !nodes[b]) return;
      let ideal = link.kind === 'category' ? idealLen * 0.52 : idealLen * 0.9;
      let dx = nodes[b].ox - nodes[a].ox;
      let dy = nodes[b].oy - nodes[a].oy;
      let d = Math.sqrt(dx * dx + dy * dy) || 1;
      let f = (d - ideal) * (link.kind === 'category' ? spring * 2.8 : spring);
      dx /= d; dy /= d;
      nodes[a].vx += dx * f; nodes[a].vy += dy * f;
      nodes[b].vx -= dx * f; nodes[b].vy -= dy * f;
    });
    // Center gravity + soft sphere boundary
    nodes.forEach(nd => {
      nd.vx -= nd.ox * gravity * 1.9;
      nd.vy -= nd.oy * gravity * 1.9;
      const d = Math.sqrt(nd.ox * nd.ox + nd.oy * nd.oy) || 1;
      const maxR = R * 1.02;
      if (d > maxR) {
        const pull = (d - maxR) * 0.004;
        nd.vx -= (nd.ox / d) * pull;
        nd.vy -= (nd.oy / d) * pull;
      }
    });
    // Apply velocity with damping
    nodes.forEach(nd => {
      nd.vx *= damping; nd.vy *= damping;
      nd.ox += nd.vx; nd.oy += nd.vy;
    });
  }

  nodes.forEach(nd => {
    if (nd.type === 'Root') { nd.ox = 0; nd.oy = 0; nd.oz = 0; }
    stabilizeNode(nd);
    nd.ox0 = nd.ox; nd.oy0 = nd.oy; nd.oz0 = nd.oz || 0;
  });
  const firstInit = nodes2d.length === 0;
  nodes2d = nodes;
  fitAllNodes(firstInit);
  if (!rafId) rafId = requestAnimationFrame(frame);
}

function fitAllNodes(animateFromCloser = false) {
  if (!nodes2d.length) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes2d.filter(isVisibleNode).forEach(nd => {
    minX = Math.min(minX, nd.ox); maxX = Math.max(maxX, nd.ox);
    minY = Math.min(minY, nd.oy); maxY = Math.max(maxY, nd.oy);
  });
  if (!Number.isFinite(minX)) return;
  const graphCx = (minX + maxX) / 2;
  const graphCy = (minY + maxY) / 2;
  const margin = Math.max(160, Math.min(W, H) * 0.18);
  const graphW = Math.max(maxX - minX + margin, 320);
  const graphH = Math.max(maxY - minY + margin, 320);
  const scale = Math.min(W / graphW, H / graphH, 1.38);
  camTargetZoom = Math.max(0.28, scale);
  camTargetPan = { x: -graphCx, y: -graphCy };
  if (animateFromCloser) {
    camZoom = Math.min(1.15, camTargetZoom * 1.35);
    camPan = { ...camTargetPan };
  }
}

function project(x, y, z = 0) {
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let x1 = x * cosY + z * sinY;
  let z1 = z * cosY - x * sinY;
  let y1 = y * cosX - z1 * sinX;
  let z2 = y * sinX + z1 * cosX;
  const depth = Math.max(.35, Math.min(1.8, 1 + z2 * 0.0008));
  const sx = cx + (x1 + camPan.x) * camZoom * depth;
  const sy = cy + (y1 + camPan.y) * camZoom * depth;
  return {
    x: Number.isFinite(sx) ? sx : cx,
    y: Number.isFinite(sy) ? sy : cy,
    depth
  };
}

function easeOutCubic(t) { return 1 - Math.pow(1 - Math.min(t, 1), 3); }

function frame() {
  rafId = requestAnimationFrame(frame);
  if (nodes2d.length === 0) return;
  stabilizeCamera();

  time += .0032;
  // Top-down underwater drift. No spin: the vault should float, not rotate.
  if (!isDraggingGraph) {
    if (focusMode && centerNodeId != null) {
      if (cameraRideTarget) {
        // Moving between nodes: return to near top-down and push closer.
        targetRotY = 0;
        targetRotX = -0.025;
      } else {
        // Settled on a node: orbit gently around the subject.
        const arcAge = Math.min(1, (performance.now() - subjectArcStartedAt) / 1200);
        const arcEase = easeOutCubic(arcAge);
        targetRotY = Math.sin(time * .42 + subjectArcPhase) * (0.055 + arcEase * 0.115);
        targetRotX = -0.04 + Math.sin(time * .34 + subjectArcPhase * .7) * (0.018 + arcEase * 0.052);
      }
    } else {
      targetRotY = Math.sin(time * .18) * 0.045;
      targetRotX = -0.035 + Math.sin(time * .14) * 0.022;
    }
  }
  // User pan stays pan; no rotational inertia.
  userRotationVelocity *= .82;
  userRotationVelocityY *= .82;
  targetRotY = Math.max(-0.18, Math.min(0.18, targetRotY));
  targetRotX = Math.max(-0.11, Math.min(0.055, targetRotX));
  rotX += (targetRotX - rotX) * .035;
  rotY += (targetRotY - rotY) * .035;
  const targetFocus = focusMode ? 1 : 0;
  focusBlend += (targetFocus - focusBlend) * .04;

  // Smooth zoom and pan; bloom stays close to the root/core and grows outward from there.
  if (vaultBloomStarted && !focusMode) {
    const bloomAge = Math.min(1, (performance.now() - bloomStartedAt) / 19000);
    const rootId = typeof rootNode === 'number' ? rootNode : VAULT.nodes.findIndex(n => n.type === 'Root');
    if (rootId >= 0 && nodes2d[rootId]) {
      camTargetPan = { x: -nodes2d[rootId].ox, y: -nodes2d[rootId].oy };
    } else {
      camTargetPan = { x:0, y:0 };
    }
    // No dramatic pull-back. Stay intimate; let the graph reveal around the core.
    camTargetZoom = 1.48 * (1 - bloomAge) + 1.18 * bloomAge;
  }
  if (cameraRideTarget && cameraRideStartPan) {
    const rideT = Math.min(1, (performance.now() - cameraRideProgress) / Math.max(cameraRideDuration, 1));
    const e = easeOutCubic(rideT);
    camPan.x = cameraRideStartPan.x + (cameraRideTarget.x - cameraRideStartPan.x) * e;
    camPan.y = cameraRideStartPan.y + (cameraRideTarget.y - cameraRideStartPan.y) * e;
    camZoom = cameraRideStartZoom + (cameraRideTarget.zoom - cameraRideStartZoom) * e;
    camTargetPan = { x: cameraRideTarget.x, y: cameraRideTarget.y };
    camTargetZoom = cameraRideTarget.zoom;
    if (rideT >= 1) { cameraRideTarget = null; subjectArcStartedAt = Math.min(subjectArcStartedAt || performance.now(), performance.now()); }
  } else {
    if (focusMode && centerNodeId != null && nodes2d[centerNodeId] && !isDraggingGraph) {
      const nd = nodes2d[centerNodeId];
      const basePan = panelAwareTargetPan(nd, camTargetZoom || 1.45);
      const arc = Math.sin(time * .38 + subjectArcPhase);
      const bob = Math.cos(time * .31 + subjectArcPhase);
      camTargetPan = {
        x: basePan.x + arc * 18 / Math.max(camZoom, .01),
        y: basePan.y + bob * 8 / Math.max(camZoom, .01)
      };
    }
    const effectiveTargetZoom = camTargetZoom * userZoomOffset;
    camZoom += (effectiveTargetZoom - camZoom) * .026;
    camPan.x += (camTargetPan.x - camPan.x) * .026;
    camPan.y += (camTargetPan.y - camPan.y) * .026;
  }

  // Dark background
  ctx.fillStyle = '#0D0B0A';
  ctx.fillRect(0, 0, W, H);

  // Subtle ambient center glow
  const ag = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * .4);
  ag.addColorStop(0, 'rgba(40,36,32,.04)');
  ag.addColorStop(1, 'transparent');
  ctx.fillStyle = ag; ctx.fillRect(0, 0, W, H);
  drawAsciiOpening();

  if (initialVaultMode) {
    const t = (performance.now() - vaultStartTime) / 1000;
    const breathe = 1 + Math.sin(t * 2.1) * 0.035;
    const floatY = Math.sin(t * 1.15) * 7;
    const r = Math.min(W, H) * 0.045 * breathe;
    const x = cx, y = cy + floatY;
    const glow = ctx.createRadialGradient(x, y, r * .35, x, y, r * 4.8);
    glow.addColorStop(0, 'rgba(190,178,164,.16)');
    glow.addColorStop(.42, 'rgba(154,139,122,.055)');
    glow.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(x, y, r * 4.8, 0, Math.PI * 2); ctx.fillStyle = glow; ctx.fill();
    const g = ctx.createRadialGradient(x - r * .25, y - r * .25, 0, x, y, r);
    g.addColorStop(0, 'rgba(214,205,194,.96)');
    g.addColorStop(.58, 'rgba(154,139,122,.82)');
    g.addColorStop(1, 'rgba(88,78,70,.72)');
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
    return;
  }

  // Node appear timing
  const elapsedSec = (performance.now() - vaultStartTime) / 1000;

  if (displaySettings.animate) {
    VAULT.links.forEach(link => {
      const a = nodes2d[link.source], b = nodes2d[link.target];
      if (!a || !b) return;
      if (chillGraphMode() && (!isVisibleNode(a) || !isVisibleNode(b))) return;
      const dx = b.ox - a.ox, dy = b.oy - a.oy;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const ideal = link.kind === 'category' ? forceSettings.idealLen * 0.52 : forceSettings.idealLen * 0.9;
      const f = (d - ideal) * (link.kind === 'category' ? 0.00045 : 0.00018);
      const ux = dx / d, uy = dy / d;
      const pinA = vaultBloomStarted && !focusMode && a.type === 'Root';
      const pinB = vaultBloomStarted && !focusMode && b.type === 'Root';
      if (!pinA) { a.vx += ux * f; a.vy += uy * f; }
      if (!pinB) { b.vx -= ux * f; b.vy -= uy * f; }
    });
    if (nodes2d.length <= 900) for (let i = 0; i < nodes2d.length; i++) {
      const a = nodes2d[i];
      if (!isVisibleNode(a)) continue;
      for (let j = i + 1; j < nodes2d.length; j++) {
        const b = nodes2d[j];
        if (!isVisibleNode(b)) continue;
        const dx = a.ox - b.ox, dy = a.oy - b.oy;
        const d2 = dx * dx + dy * dy;
        if (d2 > 0 && d2 < 2600) {
          const d = Math.sqrt(d2);
          const ageA = Math.max(0, elapsedSec - (a.appearDelay || 0));
          const ageB = Math.max(0, elapsedSec - (b.appearDelay || 0));
          const arrival = 1 + Math.max(0, 1 - Math.min(ageA, ageB) / 3.8) * 3.2;
          const f = (0.026 * arrival) / d;
          const pinA = vaultBloomStarted && !focusMode && a.type === 'Root';
          const pinB = vaultBloomStarted && !focusMode && b.type === 'Root';
          if (!pinA) { a.vx += (dx / d) * f; a.vy += (dy / d) * f; }
          if (!pinB) { b.vx -= (dx / d) * f; b.vy -= (dy / d) * f; }
        }
      }
    }
  }

  // Update 2D positions with organic drift
  nodes2d.forEach(nd => {
    stabilizeNode(nd);
    if (vaultBloomStarted && !focusMode && nd.type === 'Root') {
      nd.ox = Number.isFinite(nd.ox0) ? nd.ox0 : 0;
      nd.oy = Number.isFinite(nd.oy0) ? nd.oy0 : 0;
      nd.oz = Number.isFinite(nd.oz0) ? nd.oz0 : 0;
      nd.vx = nd.vy = nd.vz = 0;
    }
    if (chillGraphMode() && !isVisibleNode(nd)) {
      nd.vx *= .72; nd.vy *= .72; nd.vz *= .72;
      nd.px = -9999; nd.py = -9999;
      return;
    }
    const drift = (focusMode || !displaySettings.animate) ? 0 : 1;
    const alive = displaySettings.animate ? (activeSet.has(nd.id) || mainSet.has(nd.id) ? 1.0 : 0.42) : 0;
    const fx = (Math.sin(time * .055 + nd.gp) * 2.2 + Math.sin(time * .034 + nd.gp * 1.7) * 1.4 + Math.sin(time * .083 + nd.gp * .3) * .7) * drift;
    const fy = (Math.cos(time * .049 + nd.gp * 1.3) * 2.0 + Math.cos(time * .071 + nd.gp * .7) * 1.1 + Math.cos(time * .096 + nd.gp * 2.1) * .6) * drift;
    if (alive) {
      const homePull = nd.type === 'Category' ? 0.0016 : 0.0028;
      nd.vx += (nd.ox0 - nd.ox) * homePull;
      nd.vy += (nd.oy0 - nd.oy) * homePull;
      nd.vx += -nd.ox * 0.00018;
      nd.vy += -nd.oy * 0.00018;
      const pulse = Math.sin(time * 1.15 + nd.gp) * alive;
      nd.ox += nd.vx + Math.cos(nd.gp + time * .48) * 0.035 * pulse;
      nd.oy += nd.vy + Math.sin(nd.gp + time * .42) * 0.035 * pulse;
      nd.oz += Math.sin(time * .24 + nd.gp) * 0.012;
      nd.vx *= .91; nd.vy *= .91; nd.vz *= .91;
    }
    // Appear drift: nodes float in from offset during their reveal
    const age = elapsedSec - nd.appearDelay;
    const appearProgress = age > 0 ? easeOutCubic(Math.min(age / nd.appearDur, 1)) : 0;
    const settle = 1 - appearProgress;
    stabilizeNode(nd);
    nd.x = nd.ox + fx + nd.appearOx * settle;
    nd.y = nd.oy + fy + nd.appearOy * settle;
    if (!Number.isFinite(nd.x) || !Number.isFinite(nd.y)) { resetNodeToHome(nd); nd.x = nd.ox; nd.y = nd.oy; }
    const p = project(nd.x, nd.y);
    nd.px = p.x; nd.py = p.y;
  });

  // ── LINKS ──
  VAULT.links.forEach(link => {
    const a = link.source, b = link.target;
    const na = nodes2d[a], nb = nodes2d[b];
    if (!na || !nb) return;
    if (!isVisibleNode(na) || !isVisibleNode(nb)) return;

    const aMain = mainSet.has(a), bMain = mainSet.has(b);
    const aActive = activeSet.has(a), bActive = activeSet.has(b);
    const bothA = aActive && bActive;
    const eitherA = aActive || bActive;
    const bothMain = aMain && bMain;

    // Radial DOF for link visibility
    const laDof = radialDof(na.px, na.py);
    const lbDof = radialDof(nb.px, nb.py);
    const linkDof = Math.min(laDof, lbDof);

    // Tag links: only show if parent is active
    if (link.isTagLink) {
      if (!aActive) return;
      const alpha = .5 * linkDof * (1 - focusBlend * .2);
      if (alpha < .05) return;
      ctx.beginPath();
      ctx.moveTo(na.px, na.py);
      ctx.lineTo(nb.px, nb.py);
      ctx.strokeStyle = nb.tagColor ? nb.tagColor.replace(')', `,${alpha})`).replace('hsl', 'hsla') : `rgba(140,130,120,${alpha})`;
      ctx.lineWidth = .8 * displaySettings.linkThick;
      ctx.stroke();
      return;
    }

    // Note links — all visible with radial DOF, active ones brighter
    const categoryLink = link.kind === 'category';
    const rootLink = link.kind === 'root';
    const hoverActive = hoveredId !== null || draggedNodeId !== null;
    const activeHoverId = draggedNodeId !== null ? draggedNodeId : hoveredId;
    const linkedToHover = activeHoverId !== null && (a === activeHoverId || b === activeHoverId);
    const linkedToMain = mainSet.has(a) || mainSet.has(b) || draggedNodeId === a || draggedNodeId === b;
    let alpha = linkedToHover ? .9 : hoverActive ? .045 : linkedToMain ? .66 : rootLink ? .46 : categoryLink ? .20 : bothMain ? .55 : bothA ? .38 : eitherA ? .18 : .08;
    alpha *= linkDof;
    if (!eitherA && focusBlend > 0.05) alpha *= (1 - focusBlend * .5);
    if (alpha < .03) return;

    // Neighbor links filter
    if (localGraphMode && !graphSettings.showNeighborLinks && !aMain && !bMain) {
      return;
    }

    ctx.beginPath();
    ctx.moveTo(na.px, na.py);
    ctx.lineTo(nb.px, nb.py);

    const lt = displaySettings.linkThick;
    if (bothMain) {
      const gl = ctx.createLinearGradient(na.px, na.py, nb.px, nb.py);
      const t = ((time * .55 + na.gp) % 1 + 1) % 1;
      gl.addColorStop(0, `rgba(214,205,194,${alpha * .35})`);
      gl.addColorStop(t, `rgba(120,230,140,${alpha * 1.4})`);
      gl.addColorStop(1, `rgba(214,205,194,${alpha * .35})`);
      ctx.strokeStyle = gl; ctx.lineWidth = .72 * lt;
    } else if (bothA) {
      const gl = ctx.createLinearGradient(na.px, na.py, nb.px, nb.py);
      const t = ((time * .55 + na.gp) % 1 + 1) % 1;
      gl.addColorStop(0, `rgba(140,132,122,${alpha * .35})`);
      gl.addColorStop(t, `rgba(200,190,178,${alpha * 1.2})`);
      gl.addColorStop(1, `rgba(140,132,122,${alpha * .35})`);
      ctx.strokeStyle = gl; ctx.lineWidth = .62 * lt;
    } else {
      ctx.strokeStyle = (linkedToHover || linkedToMain || rootLink) ? `rgba(214,205,194,${alpha})` : categoryLink ? `rgba(154,139,122,${alpha})` : `rgba(120,112,104,${alpha})`;
      ctx.lineWidth = (linkedToHover ? .72 : linkedToMain ? .68 : rootLink ? .62 : categoryLink ? .34 : eitherA ? .42 : .24) * lt;
    }
    ctx.stroke();

    // Arrowheads
    if (displaySettings.showArrows && eitherA) {
      const angle = Math.atan2(nb.py - na.py, nb.px - na.px);
      const arrLen = 5 * lt;
      const arrX = nb.px - Math.cos(angle) * (nb.r * 1.4 + 2);
      const arrY = nb.py - Math.sin(angle) * (nb.r * 1.4 + 2);
      ctx.beginPath();
      ctx.moveTo(arrX, arrY);
      ctx.lineTo(arrX - arrLen * Math.cos(angle - .35), arrY - arrLen * Math.sin(angle - .35));
      ctx.lineTo(arrX - arrLen * Math.cos(angle + .35), arrY - arrLen * Math.sin(angle + .35));
      ctx.closePath();
      ctx.fillStyle = bothMain ? `rgba(214,205,194,${alpha})` : `rgba(160,152,144,${alpha})`;
      ctx.fill();
    }

    // Flowing particles on active links — rollercoaster feel
    if (bothA && linkDof > .3) {
      const numP = bothMain ? 3 : 1;
      for (let pi = 0; pi < numP; pi++) {
        const t2 = ((time * .5 + na.gp + pi * .33) % 1 + 1) % 1;
        const px = na.px + (nb.px - na.px) * t2;
        const py = na.py + (nb.py - na.py) * t2;
        const pR = bothMain ? 2.2 : 1.6;
        const pG = ctx.createRadialGradient(px, py, 0, px, py, pR * 2);
        if (bothMain) {
          pG.addColorStop(0, `rgba(120,230,140,${alpha * .9})`);
          pG.addColorStop(.5, `rgba(100,220,120,${alpha * .3})`);
          pG.addColorStop(1, 'rgba(80,200,100,0)');
        } else {
          pG.addColorStop(0, `rgba(200,190,178,${alpha * .7})`);
          pG.addColorStop(.5, `rgba(180,172,160,${alpha * .2})`);
          pG.addColorStop(1, 'rgba(160,150,140,0)');
        }
        ctx.beginPath(); ctx.arc(px, py, pR * 2, 0, Math.PI * 2); ctx.fillStyle = pG; ctx.fill();
      }
    }
  });

  // ── NODES ──
  nodes2d.forEach(nd => {
    if (!isVisibleNode(nd)) return;
    const isMain = mainSet.has(nd.id);
    const isA = activeSet.has(nd.id);
    const isH = hoveredId === nd.id;

    // Gathering appear animation
    const age = elapsedSec - nd.appearDelay;
    if (age < 0) return;
    const appearProgress = easeOutCubic(age / nd.appearDur);

    // Radial DOF: crystal clear at center, soft gradient to edges
    const dof = radialDof(nd.px, nd.py);
    if (dof < .05) return;

    // Softer focus: active nodes pop, surrounding nodes stay clearly visible
    const isCategory = nd.type === 'Category';
    const hoverActive = hoveredId !== null || draggedNodeId !== null;
    const activeHoverId = draggedNodeId !== null ? draggedNodeId : hoveredId;
    const isHoverMain = activeHoverId === nd.id;
    const isHoverConnected = activeHoverId !== null && connectedNodeIds(activeHoverId).has(nd.id);
    const revealed = isNodeRevealed(nd);
    const focusScale = (isMain || isA) ? 1 + focusBlend * 0.4 : 1 - focusBlend * 0.05;
    const baseAlpha = hoverActive ? (isHoverMain || isHoverConnected ? 1 : 0.2) : (isCategory || revealed ? 1 : 0.5);
    let focusAlpha = hoverActive ? baseAlpha : (isMain || isA || isCategory) ? 1 : Math.max(0.5, baseAlpha * (1 - focusBlend * 0.35));
    if (activeTagFilters.size && nd.type !== 'Category' && nd.type !== 'Root' && !isA) focusAlpha *= 0.16;

    const ns = displaySettings.nodeSize;
    const r = nd.r * ns * (isMain ? 1.6 : isA ? 1.28 : 1.0) * focusScale * appearProgress;
    const alpha = dof * focusAlpha * appearProgress;
    const gw = Math.sin(time * .9 + nd.gp) * .5 + .5;

    const drawCircleNode = (radius, fillStyle, strokeStyle = null, lineWidth = 0.8) => {
      ctx.beginPath();
      ctx.arc(nd.px, nd.py, radius, 0, Math.PI * 2);
      ctx.fillStyle = fillStyle;
      ctx.fill();
      if (strokeStyle) {
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
    };

    if (nd.type === 'Tag') {
      if (alpha < .1) return;
      ctx.globalAlpha = alpha * .9;
      drawCircleNode(r, nd.tagColor || '#8A7560', `rgba(232,228,221,${alpha * .25})`, .65);
      ctx.globalAlpha = 1;
      return;
    }

    // ── 3D SPHERE RENDERING ──
    // Specular highlight offset based on light direction (upper-left)
    const lightX = nd.px - r * .32;
    const lightY = nd.py - r * .38;
    const baseTone = nd.type === 'Root' ? 218 : isCategory ? 175 : isA ? 168 : 128;
    const hlTone = nd.type === 'Root' ? 245 : isCategory ? 215 : isA ? 200 : 170;
    const shTone = nd.type === 'Root' ? 75 : isCategory ? 65 : isA ? 58 : 45;

    // Outer ambient glow for important nodes
    if ((isMain || isA) && alpha > .15) {
      const glowR = r * 3.2;
      const glow = ctx.createRadialGradient(nd.px, nd.py, r * .6, nd.px, nd.py, glowR);
      glow.addColorStop(0, `rgba(${baseTone},${baseTone},${baseTone},${alpha * .08})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(nd.px, nd.py, glowR, 0, Math.PI * 2); ctx.fillStyle = glow; ctx.fill();
    }

    // Selected-node atmosphere + orbit back pass.
    if (isMain && alpha > .25) {
      const closeT = Math.max(0, Math.min(1, (camZoom - .92) / .62));
      const panelOpen = document.getElementById('respPanel')?.classList.contains('visible');
      const atmR = r * (1.72 + closeT * .46);
      const atm = ctx.createRadialGradient(nd.px - r * .4, nd.py - r * .45, r * .35, nd.px, nd.py, atmR);
      atm.addColorStop(0, `rgba(245,246,244,${alpha * (.09 + closeT * .055)})`);
      atm.addColorStop(.38, `rgba(198,202,200,${alpha * (.042 + closeT * .036)})`);
      atm.addColorStop(.76, `rgba(96,100,98,${alpha * (.016 + closeT * .018)})`);
      atm.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(nd.px, nd.py, atmR, 0, Math.PI * 2); ctx.fillStyle = atm; ctx.fill();

      // Single atmospheric boundary only — no double-ring shell.
      ctx.beginPath(); ctx.arc(nd.px, nd.py, r * (1.34 + closeT * .20), 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(242,244,242,${alpha * (.065 + closeT * .038)})`;
      ctx.lineWidth = .65 + closeT * .45;
      ctx.stroke();

      const orbitA = time * 2.15 + nd.gp;
      const depth = Math.sin(orbitA);            // -1 = fully behind, +1 = foreground
      const frontness = (depth + 1) / 2;         // smooth, no hard flip
      const backness = 1 - frontness;
      const ox2 = nd.px + Math.cos(orbitA) * r * 2.05;
      const oy2 = nd.py + depth * r * .72;
      const sr = Math.max(2.2, r * (.105 + frontness * .035));

      // Darker rear orbit path, hidden under the node body.
      ctx.beginPath();
      ctx.ellipse(nd.px, nd.py, r * 2.05, r * .72, 0, Math.PI, Math.PI * 2);
      ctx.strokeStyle = `rgba(34,28,24,${alpha * .24})`;
      ctx.lineWidth = .9;
      ctx.stroke();

      // Copper satellite back-pass: always present, but fades as it comes forward.
      if (backness > .02) {
        const satBack = ctx.createRadialGradient(ox2 - sr * .35, oy2 - sr * .38, 0, ox2, oy2, sr * 1.9);
        satBack.addColorStop(0, `rgba(150,150,146,${alpha * (.30 + backness * .18)})`);
        satBack.addColorStop(.42, `rgba(70,70,68,${alpha * (.30 + backness * .14)})`);
        satBack.addColorStop(1, `rgba(20,20,19,${alpha * (.16 + backness * .10)})`);
        ctx.beginPath(); ctx.arc(ox2, oy2, sr, 0, Math.PI * 2); ctx.fillStyle = satBack; ctx.fill();
      }
    }

    // Sphere body — radial gradient simulating 3D lighting
    const sg = ctx.createRadialGradient(lightX, lightY, 0, nd.px, nd.py, r);
    if (isHoverMain || draggedNodeId === nd.id) {
      sg.addColorStop(0, `rgba(255,253,248,${alpha})`);
      sg.addColorStop(.35, `rgba(235,230,222,${alpha * .95})`);
      sg.addColorStop(.72, `rgba(190,182,172,${alpha * .88})`);
      sg.addColorStop(1, `rgba(60,54,48,${alpha * .75})`);
    } else if (isMain) {
      sg.addColorStop(0, `rgba(255,253,248,${alpha})`);
      sg.addColorStop(.35, `rgba(235,230,222,${alpha * .95})`);
      sg.addColorStop(.72, `rgba(190,182,172,${alpha * .88})`);
      sg.addColorStop(1, `rgba(60,54,48,${alpha * .75})`);
    } else if (isCategory) {
      sg.addColorStop(0, `rgba(220,215,208,${alpha * .9})`);
      sg.addColorStop(.35, `rgba(175,170,162,${alpha * .85})`);
      sg.addColorStop(.72, `rgba(120,115,108,${alpha * .75})`);
      sg.addColorStop(1, `rgba(45,42,38,${alpha * .6})`);
    } else {
      sg.addColorStop(0, `rgba(${hlTone},${hlTone},${hlTone},${alpha * .75})`);
      sg.addColorStop(.35, `rgba(${baseTone},${baseTone},${baseTone},${alpha * .65})`);
      sg.addColorStop(.72, `rgba(${shTone + 30},${shTone + 28},${shTone + 24},${alpha * .55})`);
      sg.addColorStop(1, `rgba(${shTone},${shTone},${shTone},${alpha * .35})`);
    }
    ctx.beginPath(); ctx.arc(nd.px, nd.py, r, 0, Math.PI * 2); ctx.fillStyle = sg; ctx.fill();

    // Specular highlight — small bright spot
    if (r > 3 && alpha > .15) {
      const specR = r * .22;
      const specG = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, specR * 2.5);
      const specAlpha = Math.min(alpha * .85, .9);
      specG.addColorStop(0, `rgba(255,255,255,${specAlpha})`);
      specG.addColorStop(.5, `rgba(255,252,245,${specAlpha * .3})`);
      specG.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(lightX, lightY, specR * 2.5, 0, Math.PI * 2); ctx.fillStyle = specG; ctx.fill();
    }

    // Rim light — subtle edge highlight on opposite side
    if (r > 4 && alpha > .2) {
      const rimX = nd.px + r * .35;
      const rimY = nd.py + r * .25;
      const rimG = ctx.createRadialGradient(rimX, rimY, r * .7, nd.px, nd.py, r);
      rimG.addColorStop(0, 'rgba(0,0,0,0)');
      rimG.addColorStop(.8, 'rgba(0,0,0,0)');
      rimG.addColorStop(1, `rgba(${baseTone + 40},${baseTone + 38},${baseTone + 34},${alpha * .18})`);
      ctx.beginPath(); ctx.arc(nd.px, nd.py, r, 0, Math.PI * 2); ctx.fillStyle = rimG; ctx.fill();
    }

    // MOC/category ring — 3D torus ring
    if ((nd.type === 'Root' || nd.type === 'MOC' || isCategory) && !isMain && alpha > .2) {
      ctx.globalAlpha = alpha * .25;
      const ringR = r * 1.65;
      // Elliptical ring to suggest 3D tilt
      ctx.beginPath();
      ctx.ellipse(nd.px, nd.py, ringR, ringR * .38, -.25, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(210,205,198,.35)`;
      ctx.lineWidth = .6;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Panel link hover target — purple locating ring from source pill.
    if (panelHoverNodeId === nd.id && alpha > .12) {
      const pulse = Math.sin(time * 4.6) * .5 + .5;
      ctx.beginPath();
      ctx.arc(nd.px, nd.py, r * (1.92 + pulse * .18), 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(139,92,246,${alpha * (.66 + pulse * .22)})`;
      ctx.lineWidth = 1.6 + pulse * .8;
      ctx.stroke();
      const pr = r * (2.55 + pulse * .26);
      const pg = ctx.createRadialGradient(nd.px, nd.py, r * 1.2, nd.px, nd.py, pr);
      pg.addColorStop(0, `rgba(139,92,246,${alpha * .11})`);
      pg.addColorStop(1, 'rgba(139,92,246,0)');
      ctx.beginPath(); ctx.arc(nd.px, nd.py, pr, 0, Math.PI * 2); ctx.fillStyle = pg; ctx.fill();
    }

    // Selected-node satellite front pass — neutral reflective, smoothly brightens in front.
    if (isMain && alpha > .25) {
      const orbitA = time * 2.15 + nd.gp;
      const depth = Math.sin(orbitA);
      const frontness = (depth + 1) / 2;
      const ox2 = nd.px + Math.cos(orbitA) * r * 2.05;
      const oy2 = nd.py + depth * r * .72;
      // Small white comet trail behind the orbiting sphere.
      for (let t = 1; t <= 8; t++) {
        const a2 = orbitA - t * .105;
        const d2 = Math.sin(a2);
        const f2 = (d2 + 1) / 2;
        if (f2 < .03) continue;
        const tx = nd.px + Math.cos(a2) * r * 2.05;
        const ty = nd.py + d2 * r * .72;
        const tr = Math.max(.45, r * (.052 - t * .0038));
        ctx.beginPath();
        ctx.arc(tx, ty, tr, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,246,${alpha * f2 * (.15 - t * .012)})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.ellipse(nd.px, nd.py, r * 2.05, r * .72, 0, 0, Math.PI);
      ctx.strokeStyle = `rgba(210,214,214,${alpha * (.02 + frontness * .045)})`;
      ctx.lineWidth = .7;
      ctx.stroke();
      if (frontness > .04) {
        const sr = Math.max(2.2, r * (.105 + frontness * .035));
        const sat = ctx.createRadialGradient(ox2 - sr * .42, oy2 - sr * .45, 0, ox2, oy2, sr * 1.75);
        sat.addColorStop(0, `rgba(245,246,238,${alpha * (.36 + frontness * .42)})`);
        sat.addColorStop(.25, `rgba(178,184,182,${alpha * (.34 + frontness * .26)})`);
        sat.addColorStop(.68, `rgba(82,84,82,${alpha * (.28 + frontness * .18)})`);
        sat.addColorStop(1, `rgba(32,32,30,${alpha * (.16 + frontness * .12)})`);
        ctx.beginPath(); ctx.arc(ox2, oy2, sr, 0, Math.PI * 2); ctx.fillStyle = sat; ctx.fill();
        const glint = ctx.createRadialGradient(ox2 - sr * .42, oy2 - sr * .45, 0, ox2 - sr * .42, oy2 - sr * .45, sr * .65);
        glint.addColorStop(0, `rgba(255,255,240,${alpha * frontness * .75})`);
        glint.addColorStop(1, 'rgba(255,255,240,0)');
        ctx.beginPath(); ctx.arc(ox2 - sr * .32, oy2 - sr * .35, sr * .72, 0, Math.PI * 2); ctx.fillStyle = glint; ctx.fill();
      }
    }

    // Node labels intentionally hidden — names live in the side panel/tooltip.
  });

  // ── HOVER CHECK ── (skip tooltips on touch devices)
  let best = null, bestD = 36 / camZoom;
  nodes2d.forEach(nd => {
    if (!isVisibleNode(nd)) return;
    const dx = mouse.x - nd.px, dy = mouse.y - nd.py;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestD) { bestD = d; best = nd.id; }
  });
  if (best !== hoverCandidateId) {
    hoverCandidateId = best;
    hoverCandidateAt = performance.now();
  }
  const settledHover = best !== null && (performance.now() - hoverCandidateAt > 240) ? best : null;
  if (settledHover !== hoveredId) {
    hoveredId = settledHover;
    if (!isTouchDevice) {
      const tt = document.getElementById('tooltip');
      if (hoveredId !== null) {
        const nd = nodes2d[hoveredId];
        document.getElementById('ttName').textContent = nd.type === 'Tag' ? '#' + nd.name : nd.name;
        document.getElementById('ttMeta').textContent = nd.type === 'Tag' ? 'Tag' : `${nd.type}${nd.tags && nd.tags.length ? ' · ' + nd.tags[0] : ''}`;
        tt.style.left = (mouse.x + 16) + 'px'; tt.style.top = (mouse.y - 8) + 'px';
        tt.classList.add('vis');
      } else { tt.classList.remove('vis'); }
    }
  }
  if (hoveredId !== null && !isTouchDevice) {
    const tt = document.getElementById('tooltip');
    tt.style.left = (mouse.x + 16) + 'px'; tt.style.top = (mouse.y - 8) + 'px';
  }
}

function radialDof(px, py) {
  const dx = px - cx;
  const dy = py - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = Math.min(W, H) * 0.48;
  return Math.max(.35, 1 - Math.pow(dist / maxDist, 1.8));
}

// ══════════════════════════════════════════════
// NODE RELEVANCE
// ══════════════════════════════════════════════
function getRelevantNodes(q) {
  q = q.toLowerCase();
  const scores = new Array(VAULT.noteCount).fill(0);

  VAULT.nodes.slice(0, VAULT.noteCount).forEach(nd => {
    if (nd.name.toLowerCase().split(' ').some(w => w.length > 3 && q.includes(w))) scores[nd.id] += 5;
    nd.tags.forEach(t => { if (q.includes(t)) scores[nd.id] += 3; });
    const words = q.split(/\s+/).filter(w => w.length > 3);
    words.forEach(w => { if (nd.content.toLowerCase().includes(w)) scores[nd.id] += 1; });
  });

  const ranked = scores.map((s, i) => ({ id: i, s })).sort((a, b) => b.s - a.s);
  const best = ranked.find(x => x.s > 0);
  if (!best) return { centerId: 0 };
  return { centerId: best.id };
}

function computeLocalGraph(centerId, depth) {
  const visible = new Set([centerId]);
  const noteCount = VAULT.noteCount;

  // Always include tags of center node
  VAULT.links.forEach(link => {
    if (link.isTagLink && link.source === centerId) visible.add(link.target);
  });

  let frontier = new Set([centerId]);
  for (let d = 0; d < depth; d++) {
    const nextFrontier = new Set();
    frontier.forEach(id => {
      VAULT.links.forEach(link => {
        if (link.isTagLink) {
          if (link.source === id) visible.add(link.target);
          return;
        }
        if (graphSettings.showOutgoing && link.source === id && !visible.has(link.target) && link.target < noteCount) {
          visible.add(link.target);
          nextFrontier.add(link.target);
        }
        if (graphSettings.showIncoming && link.target === id && !visible.has(link.source) && link.source < noteCount) {
          visible.add(link.source);
          nextFrontier.add(link.source);
        }
      });
    });
    frontier = nextFrontier;
  }
  return visible;
}

function buildVaultContext(ids) {
  return ids.map(id => {
    const nd = VAULT.nodes[id];
    return `## ${nd.name} [${nd.type}]\n${nd.content}`;
  }).join('\n\n---\n\n');
}

let busy = false;
