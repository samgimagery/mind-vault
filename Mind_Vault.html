function currentScarlettLabVaultKey() {
  return currentVaultName === 'samg.studio' ? 'samg.studio' : 'mission-control';
}

function renderScarlettLabPanel(question, answer, data) {
  const trace = data.trace || {};
  const sources = data.sources || [];
  const sourceList = sources.length
    ? sources.map(p => `<button class="set-btn" onclick="focusVaultNodes(${JSON.stringify(p.split('/').pop().replace(/\.md$/i, ''))})">${escapeHtml(p.split('/').pop().replace(/\.md$/i, ''))}</button>`).join('')
    : '<span class="thinking">No local source match.</span>';
  document.getElementById('respHead').textContent = 'Scarlett Lab';
  document.getElementById('respBody').innerHTML = `
    <div class="panel-title">${escapeHtml(question)}</div>
    <div class="panel-meta">${escapeHtml(trace.vault || currentScarlettLabVaultKey())} · ${escapeHtml(data.model || 'local')} · ${data.latency_ms || trace.latency_ms || 0}ms · score ${data.top_score || 0}</div>
    <div class="panel-preview">${escapeHtml(answer).replace(/\n/g, '<br>')}</div>
    <div class="panel-actions"><button class="set-btn" onclick="readTextAloud('Scarlett Lab', ${JSON.stringify(answer)}, event)">Speak</button></div>
    <div class="note-section" style="margin-top:16px"><div class="note-section-title">Access trace</div><div class="note-pill-row">${sourceList}</div></div>
  `;
  document.getElementById('respPanel')?.classList.add('visible');
  document.getElementById('panelFooter')?.style && (document.getElementById('panelFooter').style.display='none');
}

async function queryVault(q) {
  if (busy || VAULT.nodes.length === 0) return;
  busy = true;
  focusMode = true;

  focusVaultNodes(q);
  addTranscriptToChat(q, 'user');
  document.getElementById('respHead').textContent = 'Scarlett Lab';
  document.getElementById('respBody').innerHTML = `<div class="panel-title">Scarlett is looking…</div><div class="panel-desc">Searching the visible Mind Vault context.</div>`;
  document.getElementById('respPanel')?.classList.add('visible');

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 45000);
    const activeNode = activePanelNodeId != null ? VAULT.nodes[activePanelNodeId] : null;
    const activeContent = activeNode ? await ensureNodeContent(activePanelNodeId) : '';
    const res = await fetch(SCARLETT_LAB_SERVER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: q,
        language: currentLang,
        vault: currentScarlettLabVaultKey(),
        currentNode: activeNode ? { path: activeNode.path || '', name: activeNode.name || '', content: activeContent || '' } : null,
        maxSources: 5
      }),
      signal: controller.signal
    });
    clearTimeout(timeoutId);

    const data = await res.json();
    if (!res.ok || data.ok === false) throw new Error(data.error || 'Scarlett Lab failed');
    const text = data.refused ? "I couldn't find that in the vault." : (data.answer || 'No response.');
    const sources = data.sources || [];
    renderScarlettLabPanel(q, text, data);
    updateConvConstellation(q, text, sources);
    busy = false;
  } catch (e) {
    document.getElementById('respHead').textContent = 'Scarlett Lab';
    document.getElementById('respBody').innerHTML = `<div class="panel-title">Scarlett Lab unavailable</div><div class="panel-desc">${escapeHtml(e.message || String(e))}</div>`;
    document.getElementById('respPanel')?.classList.add('visible');
    busy = false;
  }
}

// ══════════════════════════════════════════════
// LIVING CONVERSATION CONSTELLATION
// ══════════════════════════════════════════════
let convNodes = []; // {id, name, x, y, radius, targetR, opacity, mentionCount, lastMention}
let convLinks = []; // {source, target, opacity}
let convCanvas, convCtx;

function initConvConstellation() {
  convCanvas = document.getElementById('convCanvas');
  if (!convCanvas) return;
  convCtx = convCanvas.getContext('2d');
  resizeConvCanvas();
  requestAnimationFrame(drawConvConstellation);
}

function resizeConvCanvas() {
  if (!convCanvas) return;
  const isPhone = window.innerWidth <= 768;
  if (isPhone) {
    convCanvas.width = window.innerWidth;
    convCanvas.height = window.innerHeight * 0.55;
  } else {
    convCanvas.width = 320;
    convCanvas.height = window.innerHeight;
  }
}

function updateConvConstellation(query, answer, sources) {
  const portion = document.getElementById('vaultPortion');
  
  // Map sources to vault nodes
  const sourceIds = sources.map(p => {
    const name = p.split('/').pop().replace('.md', '');
    for (let i = 0; i < VAULT.noteCount; i++) {
      if (VAULT.nodes[i].name && VAULT.nodes[i].name.replace('.md', '') === name) return i;
    }
    return -1;
  }).filter(id => id >= 0);
  
  // Update vault portion indicator
  if (sourceIds.length > 0) {
    const pct = Math.round((sourceIds.length / VAULT.noteCount) * 100);
    portion.textContent = `${sourceIds.length} of ${VAULT.noteCount} notes · ${pct}%`;
    portion.classList.add('visible');
  }
  
  // Add or update conversation nodes
  for (const sid of sourceIds) {
    const nd = VAULT.nodes[sid];
    if (!nd) continue;
    let existing = convNodes.find(n => n.id === sid);
    if (existing) {
      existing.mentionCount++;
      existing.lastMention = Date.now();
      existing.targetR = Math.min(8 + existing.mentionCount * 3, 24); // Max size
    } else {
      // Find wikilinks from this node to other conv nodes
      convNodes.push({
        id: sid,
        name: nd.name,
        x: convCanvas.width/2 + (Math.random() - 0.5) * 100,
        y: convCanvas.height/2 + (Math.random() - 0.5) * 100,
        radius: 8,
        targetR: 11,
        opacity: 0,
        mentionCount: 1,
        lastMention: Date.now(),
      });
      
      // Create links to other conv nodes if wikilinks exist
      const links = nd.links || [];
      for (const linkName of links) {
        const targetId = convNodes.find(n => n.name === linkName)?.id;
        if (targetId !== undefined && targetId !== sid) {
          if (!convLinks.find(l => (l.source === sid && l.target === targetId) || (l.source === targetId && l.target === sid))) {
            convLinks.push({ source: sid, target: targetId, opacity: 0 });
          }
        }
      }
    }
  }
  
  // Fade nodes not mentioned recently (detach)
  const now = Date.now();
  for (const cn of convNodes) {
    const age = now - cn.lastMention;
    if (age > 60000) { // 1 minute
      cn.opacity = Math.max(0, cn.opacity - 0.02);
    } else {
      cn.opacity = Math.min(1, cn.opacity + 0.05);
    }
  }
  
  // Fade links similarly
  for (const cl of convLinks) {
    const srcNode = convNodes.find(n => n.id === cl.source);
    const tgtNode = convNodes.find(n => n.id === cl.target);
    if (srcNode && tgtNode && srcNode.opacity > 0.1 && tgtNode.opacity > 0.1) {
      cl.opacity = Math.min(1, cl.opacity + 0.03);
    } else {
      cl.opacity = Math.max(0, cl.opacity - 0.02);
    }
  }
  
  // Remove dead nodes/links
  convNodes = convNodes.filter(n => n.opacity > 0.01);
  convLinks = convLinks.filter(l => l.opacity > 0.01);
}

function drawConvConstellation() {
  if (!convCtx || !convCanvas) { requestAnimationFrame(drawConvConstellation); return; }
  
  convCtx.clearRect(0, 0, convCanvas.width, convCanvas.height);
  
  const cx = convCanvas.width / 2;
  const cy = convCanvas.height / 2;
  const isPhone = window.innerWidth <= 768;
  
  // Animate nodes toward center cluster + gentle force simulation
  for (const cn of convNodes) {
    // Spring toward center of cluster
    const dx = cx - cn.x;
    const dy = cy - cn.y;
    cn.x += dx * 0.02;
    cn.y += dy * 0.02;
    
    // Repel from other nodes
    for (const other of convNodes) {
      if (other === cn) continue;
      const rx = cn.x - other.x;
      const ry = cn.y - other.y;
      const dist = Math.sqrt(rx*rx + ry*ry) || 1;
      const minDist = cn.radius + other.radius + 20;
      if (dist < minDist) {
        cn.x += (rx / dist) * 0.5;
        cn.y += (ry / dist) * 0.5;
      }
    }
    
    // Animate radius toward target
    cn.radius += (cn.targetR - cn.radius) * 0.1;
  }
  
  // Draw links
  for (const cl of convLinks) {
    const src = convNodes.find(n => n.id === cl.source);
    const tgt = convNodes.find(n => n.id === cl.target);
    if (!src || !tgt) continue;
    convCtx.beginPath();
    convCtx.moveTo(src.x, src.y);
    convCtx.lineTo(tgt.x, tgt.y);
    convCtx.strokeStyle = `rgba(214,205,194,${cl.opacity * 0.25})`;
    convCtx.lineWidth = 1;
    convCtx.stroke();
  }
  
  // Draw nodes
  for (const cn of convNodes) {
    if (cn.opacity < 0.01) continue;
    
    // Glow
    const grad = convCtx.createRadialGradient(cn.x, cn.y, 0, cn.x, cn.y, cn.radius * 2);
    grad.addColorStop(0, `rgba(214,205,194,${cn.opacity * 0.15})`);
    grad.addColorStop(1, `rgba(214,205,194,0)`);
    convCtx.fillStyle = grad;
    convCtx.beginPath();
    convCtx.arc(cn.x, cn.y, cn.radius * 2, 0, Math.PI * 2);
    convCtx.fill();
    
    // Dot
    convCtx.beginPath();
    convCtx.arc(cn.x, cn.y, cn.radius, 0, Math.PI * 2);
    convCtx.fillStyle = `rgba(214,205,194,${cn.opacity * 0.6})`;
    convCtx.fill();
    
    // Label
    if (cn.radius > 6 && cn.opacity > 0.3) {
      convCtx.font = `${isPhone ? '9' : '10'}px -apple-system, BlinkMacSystemFont, sans-serif`;
      convCtx.fillStyle = `rgba(232,228,221,${cn.opacity * 0.5})`;
      convCtx.textAlign = 'center';
      convCtx.fillText(cn.name, cn.x, cn.y + cn.radius + 14);
    }
  }
  
  requestAnimationFrame(drawConvConstellation);
}

function typewriter(text, ids) {
  const el = document.getElementById('respBody');
  el.innerHTML = ''; let i = 0;
  function tick() {
    if (i < text.length) {
      el.textContent = text.slice(0, i + 1);
      i += Math.ceil(Math.random() * 3);
      setTimeout(tick, 14 - Math.random() * 8);
    } else {
      el.innerHTML = linkifyReferences(text, ids);
      renderSrc(ids); busy = false;
    }
  }
  tick();
}

function linkifyReferences(text, ids) {
  // Escape HTML first
  const div = document.createElement('div');
  div.textContent = text;
  let safe = div.innerHTML;
  // Replace note names with clickable references
  ids.forEach(id => {
    const nd = VAULT.nodes[id];

    const re = new RegExp(nd.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
    safe = safe.replace(re, `<span class="ref-link" onclick="openRefModal(${id})">${nd.name}</span>`);

function createSurface({ type, title, sourceNodeId = null, sourcePath = '', content = '', summary = '', preview = '', html = '' }) {
  const nd = sourceNodeId != null ? VAULT.nodes[sourceNodeId] : null;
  const surface = {
    id: `surface_${Date.now()}_${++surfaceSeq}`,
    type,
    title: title || nd?.name || 'Untitled surface',
    sourceNodeId,
    sourcePath: sourcePath || nd?.path || '',
    content: content || '',
    summary: summary || '',
    preview: preview || summary || content || '',
    html: html || '',
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  surfaceRegistry.current = surface;
  surfaceRegistry.history.unshift(surface);
  surfaceRegistry.history = surfaceRegistry.history.slice(0, 24);
  window.surfaceRegistry = surfaceRegistry;
  return surface;
}

function pinCurrentSurface() {
  let surface = surfaceRegistry.current;
  if (!surface && activePanelNodeId != null) {
    const nd = VAULT.nodes[activePanelNodeId];
    if (nd) surface = createSurface({ type:'node', title:nd.name, sourceNodeId:activePanelNodeId, sourcePath:nd.path || '', content:nd.content || '', preview:nd.content || nd.category || '' });

  const existing = surfaceRegistry.pinned.findIndex(s => s.id === surface.id || (s.type === surface.type && s.sourceNodeId === surface.sourceNodeId && s.title === surface.title));
  if (existing >= 0) surfaceRegistry.pinned.splice(existing, 1);

  surfaceRegistry.current = surface;
  if (surface.sourceNodeId != null && VAULT.nodes[surface.sourceNodeId]) focusOnNode(surface.sourceNodeId);

function panelAwareTargetPan(nd, zoom) {
  const panel = document.getElementById('respPanel');
  const panelOpen = panel?.classList.contains('visible');
  const isWide = W > 820;
  let targetX = cx;
  let targetY = cy;
  if (panelOpen && isWide) {
    const panelRect = panel.getBoundingClientRect();
    const availableLeft = Math.max(0, panelRect.left);
    // Center selected sphere in the space left of the panel, with a little editorial bias toward center.
    targetX = Math.max(W * .28, Math.min(W * .48, availableLeft * .5));
    targetY = H * .5;
  } else if (panelOpen) {
    targetY = H * .42;
  }
  return {
    x: ((targetX - cx) / Math.max(zoom, .01)) - nd.ox,
    y: ((targetY - cy) / Math.max(zoom, .01)) - nd.oy
  };
}

function rideCameraTo(id, duration = 1550) {
  const nd = nodes2d[id];
  if (!nd) return;
  cameraRideStartPan = { ...camPan };
  cameraRideStartZoom = camZoom;
  const panelOpen = document.getElementById('respPanel')?.classList.contains('visible');
  const targetZoom = panelOpen ? (W <= 768 ? 2.75 : 2.62) : 2.35;
  const targetPan = panelAwareTargetPan(nd, targetZoom);
  cameraRideTarget = { x: targetPan.x, y: targetPan.y, zoom: targetZoom };
  cameraRideFocusId = id;
  cameraRideProgress = performance.now();
  cameraRideDuration = duration;
  subjectArcPhase = (nd.gp || 0) + Math.PI * .27;
  subjectArcStartedAt = performance.now() + duration * .38;
  camTargetPan = { x: targetPan.x, y: targetPan.y };
  camTargetZoom = targetZoom;
  userZoomOffset = 1;
}

function focusOnNode(id) {
  if (!nodes2d[id]) return;
  const nd = VAULT.nodes[id];
  if (!nd) return;

  localGraphMode = true;
  centerNodeId = id;
  focusMode = true;
  userZoomOffset = 1;
  playNodeSelectSound();

  let ids;
  if (nd.type === 'Category') {
    expandedCategories.add(nd.name);
    ids = connectedNodeIds(id);
    const categoryNotes = noteIdsFromSet(ids).sort((a, b) => (VAULT.nodes[a].createdOrder ?? a) - (VAULT.nodes[b].createdOrder ?? b));
    lastFilterIds = new Set(categoryNotes);
    lastFilterLabel = nd.name;
    setPaperCarouselIds(categoryNotes, true, true);
    if (VAULT.nodes.length > 700 && ids.size > 160) {
      const staged = new Set([id]);
      const rootId = VAULT.nodes.findIndex(n => n.type === 'Root');
      if (rootId >= 0) staged.add(rootId);
      categoryNotes.slice(0, 120).forEach(x => staged.add(x));
      ids = staged;
    }
  } else {
    expandedCategories.add(nd.category);
    ids = computeLocalGraph(id, graphSettings.depth);
    const catId = categoryNodeId(nd.category);
    if (catId >= 0) ids.add(catId);
    const siblings = VAULT.nodes.slice(0, VAULT.noteCount).filter(n => n.category === nd.category).map(n => n.id).sort((a,b)=>(VAULT.nodes[a].createdOrder??a)-(VAULT.nodes[b].createdOrder??b));
    const carouselSet = siblings.length ? siblings : noteIdsFromSet(ids);
    lastFilterIds = new Set(carouselSet);
    lastFilterLabel = nd.category || 'Related';
    setPaperCarouselIds(carouselSet, false, true);
    const idx = paperCarouselIds.indexOf(id);
    if (idx >= 0) { paperCarouselIndex = idx; paperCarouselPosition = idx; renderPaperCarousel(); }
  }

  visibleSet = new Set(ids);
  activeSet = new Set(ids);
  mainSet = new Set([id]);
  currentFrameSet = new Set(ids);
  document.getElementById('sA').textContent = visibleSet.size;
  updateAdaptiveStats();
  zoomToCluster();
  if (!panelManuallyCollapsed) showNodePanel(id, ids);
  else {
    activePanelNodeId = id;
    const panel = document.getElementById('respPanel');
    panel?.classList.add('visible', 'collapsed');
    updatePanelExpandButton();
  }
  // After the panel is visible, ride the selected node into the available canvas lane.
  requestAnimationFrame(() => rideCameraTo(id, 1850));
}


function parseObsidianProperties(markdown) {
  const text = markdown || '';
  const m = text.match(/^---\s*\n([\s\S]*?)\n---/);
  if (!m) return { props: [], body: text };
  const raw = m[1].replace(/\r/g, '');
  const body = text.slice(m[0].length).trim();
  const props = [];
  let current = null;
  raw.split('\n').forEach(line => {
    if (!line.trim() || /^\s*#/.test(line)) return;
    const item = line.match(/^\s*-\s*(.+)$/);
    if (item && current) {
      if (!Array.isArray(current.value)) current.value = current.value ? [current.value] : [];
      current.value.push(item[1].trim().replace(/^['"]|['"]$/g, ''));
      return;
    }
    const nested = line.match(/^\s+([A-Za-z0-9_ -]+):\s*(.*)$/);
    if (nested && current) {
      if (typeof current.value !== 'object' || Array.isArray(current.value)) current.value = {};
      current.value[nested[1].trim()] = nested[2].trim().replace(/^['"]|['"]$/g, '');
      return;
    }
    const kv = line.match(/^([A-Za-z0-9_ -]+):\s*(.*)$/);
    if (kv) {
      const rawVal = kv[2].trim();
      let value = rawVal.replace(/^['"]|['"]$/g, '');
      if (/^\[.*\]$/.test(rawVal)) value = rawVal.slice(1, -1).split(',').map(x => x.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
      current = { key: kv[1].trim(), value };
      props.push(current);
    }
  });
  return { props: props.filter(p => p.key && !(Array.isArray(p.value) && !p.value.length) && p.value !== ''), body };
}

function humanizePropertyKey(key) {
  return String(key || '')
    .replace(/[_-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/\b\w/g, ch => ch.toUpperCase());
}

function propertyByKey(props, names) {
  const wanted = new Set(names.map(x => x.toLowerCase()));
  return (props || []).find(p => wanted.has(String(p.key || '').toLowerCase()));
}

function normalizeTag(tag) {
  return String(tag || '').trim().replace(/^#+/, '').replace(/^['"]|['"]$/g, '').toLowerCase();
}

function isTagPropertyKey(key) {
  return /^(tags?|keywords?|topics?|category|categories)$/i.test(String(key || '').trim());
}

function valueToList(value) {
  if (Array.isArray(value)) return value.flatMap(valueToList);
  if (value && typeof value === 'object') return Object.values(value).flatMap(valueToList);
  return String(value || '').split(/[,;]/).map(x => x.trim()).filter(Boolean);
}

function renderTagPill(value) {
  const tag = normalizeTag(value);
  if (!tag) return '';
  const label = String(value || '').trim().replace(/^#+/, '');
  const active = activeTagFilters.has(tag) ? ' active' : '';
  return `<button class="tag-filter-pill${active}" data-tag-filter="${escapeHtml(tag)}" onclick="toggleTagFilter(this.dataset.tagFilter, event)">#${escapeHtml(label)}</button>`;
}

function renderPropertyValue(value, key = '') {
  if (isTagPropertyKey(key)) return `<div class="note-pill-row">${valueToList(value).slice(0, 24).map(renderTagPill).join('')}</div>`;
  if (Array.isArray(value)) return `<div class="note-pill-row">${value.slice(0, 24).map(v => `<span class="obsidian-prop-pill">${escapeHtml(v)}</span>`).join('')}</div>`;
  if (value && typeof value === 'object') return `<div class="obsidian-prop-list">${Object.entries(value).slice(0, 12).map(([k,v]) => `<div class="obsidian-prop-list-item"><span class="obsidian-prop-key">${escapeHtml(humanizePropertyKey(k))}</span><span class="obsidian-prop-val">${escapeHtml(String(v))}</span></div>`).join('')}</div>`;
  const str = String(value || '').trim();
  const vals = str.includes(',') ? str.split(/,\s*/).filter(Boolean) : [];
  return vals.length > 1 ? vals.slice(0, 16).map(v => `<span class="obsidian-prop-pill">${escapeHtml(v)}</span>`).join('') : escapeHtml(str || '—');
}

function renderObsidianProperties(props) {
  if (!props || !props.length) return '';
  const priority = ['type','status','category','project','area','date','created','updated','source','author','tags'];
  const featuredKeys = new Set(priority);
  const byPriority = [...props].sort((a, b) => {
    const ai = priority.indexOf(String(a.key || '').toLowerCase());
    const bi = priority.indexOf(String(b.key || '').toLowerCase());
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });
  const featured = byPriority.filter(p => featuredKeys.has(String(p.key || '').toLowerCase())).slice(0, 6);
  const rest = byPriority.filter(p => !featured.includes(p)).slice(0, 12);
  const row = (p, cls = '') => `<div class="frontmatter-prop ${cls}"><div class="obsidian-prop-key">${escapeHtml(humanizePropertyKey(p.key))}</div><div class="obsidian-prop-val">${renderPropertyValue(p.value, p.key)}</div></div>`;
  const featuredHtml = featured.length ? `<div class="frontmatter-featured">${featured.map(p => row(p, 'featured')).join('')}</div>` : '';
  const restHtml = rest.length ? `<div class="frontmatter-grid">${rest.map(p => row(p)).join('')}</div>` : '';
  return `<div class="frontmatter-card"><div class="frontmatter-head"><div class="frontmatter-label">Frontmatter</div><div class="frontmatter-count">${props.length} propert${props.length === 1 ? 'y' : 'ies'}</div></div>${featuredHtml}${restHtml}</div>`;
}

function extractFrontmatterTags(props) {
  const tags = [];
  (props || []).forEach(p => {
    if (!isTagPropertyKey(p.key)) return;
    valueToList(p.value).forEach(v => {
      const t = normalizeTag(v);
      if (t) tags.push(t);
    });
  });
  return [...new Set(tags)];
}

function extractAllNodeTags(markdown) {
  const parsed = parseObsidianProperties(markdown || '');
  return [...new Set([...extractFrontmatterTags(parsed.props), ...extractHashtags(parsed.body || markdown || '').map(normalizeTag)].filter(Boolean))];
}

function addToTagIndex(tag, id) {
  if (!tagIndex.has(tag)) tagIndex.set(tag, new Set());
  tagIndex.get(tag).add(id);
}

async function buildTagIndex() {
  if (tagIndexBuilt) return;
  if (tagIndexBuilding) return tagIndexBuilding;
  tagIndexBuilding = (async () => {
    const bar = document.getElementById('tagFilterBar');
    if (bar) { bar.classList.add('visible'); bar.innerHTML = '<span class="tag-filter-label">Indexing tags…</span>'; }
    const ids = Array.from({ length: VAULT.noteCount || 0 }, (_, i) => i);
    let cursor = 0;
    const workers = Array.from({ length: Math.min(18, ids.length || 1) }, async () => {
      while (cursor < ids.length) {
        const id = ids[cursor++];
        const nd = VAULT.nodes[id];
        if (!nd || nd.type === 'Category') continue;
        const content = await ensureNodeContent(id);
        nd.filterTags = extractAllNodeTags(content || nd.content || '');
        nd.filterTags.forEach(tag => addToTagIndex(tag, id));
      }
    });
    await Promise.all(workers);
    tagIndexBuilt = true;
    tagIndexBuilding = null;
  })();
  return tagIndexBuilding;
}

function updateTagFilterBar(matchCount = null) {
  const bar = document.getElementById('tagFilterBar');
  if (!bar) return;
  const tags = [...activeTagFilters];
  if (!tags.length) { bar.classList.remove('visible'); bar.innerHTML = ''; return; }
  const chips = tags.map(tag => `<button class="tag-filter-chip" data-tag-filter="${escapeHtml(tag)}" onclick="toggleTagFilter(this.dataset.tagFilter, event)">#${escapeHtml(tag)} ×</button>`).join('');
  const count = matchCount == null ? '' : `<span class="tag-filter-label">${matchCount} notes</span>`;
  bar.innerHTML = `<span class="tag-filter-label">Filtered by</span>${chips}${count}<button class="tag-filter-clear" onclick="clearTagFilters(event)">Clear</button>`;
  bar.classList.add('visible');
  document.querySelectorAll('[data-tag-filter]').forEach(el => el.classList.toggle('active', activeTagFilters.has(el.dataset.tagFilter)));
}

async function toggleTagFilter(tag, event) {
  event?.stopPropagation?.();
  tag = normalizeTag(tag);
  if (!tag) return;
  if (activeTagFilters.has(tag)) activeTagFilters.delete(tag); else activeTagFilters.add(tag);
  await applyTagFilters();
}

function clearTagFilters(event) {
  event?.stopPropagation?.();
  activeTagFilters.clear();
  lastFilterIds = new Set();
  lastFilterLabel = '';
  tagIndexBuilt = false;
  tagIndex.clear();
  focusMode = centerNodeId != null;
  if (centerNodeId != null) {
    const ids = connectedNodeIds(centerNodeId);
    activeSet = new Set(ids);
    visibleSet = new Set(ids);
    currentFrameSet = new Set(ids);
  } else {
    activeSet.clear();
    visibleSet.clear();
    currentFrameSet.clear();
    localGraphMode = false;
  }
  document.getElementById('sA').textContent = activeSet.size || 0;
  updateAdaptiveStats();
  updateTagFilterBar();
}

async function applyTagFilters() {
  if (!activeTagFilters.size) { clearTagFilters(); return; }
  await buildTagIndex();
  const tags = [...activeTagFilters];
  let ids = null;
  for (const tag of tags) {
    const set = tagIndex.get(tag) || new Set();
    ids = ids == null ? new Set(set) : new Set([...ids].filter(id => set.has(id)));
  }
  ids = ids || new Set();
  const framed = new Set(ids);
  ids.forEach(id => {
    const nd = VAULT.nodes[id];
    if (!nd) return;
    if (nd.category && VAULT.noteMap[nd.category]) framed.add(VAULT.noteMap[nd.category].id);
  });
  visibleSet = framed;
  lastFilterIds = new Set(ids);
  lastFilterLabel = tags.length ? `#${tags.join(' + #')}` : 'Filtered';
  activeSet = new Set(ids);
  currentFrameSet = framed;
  focusMode = true;
  localGraphMode = true;
  centerNodeId = null;
  document.getElementById('sA').textContent = ids.size;
  updateAdaptiveStats();
  updateTagFilterBar(ids.size);
  setPaperCarouselIds([...ids].sort((a,b)=>(VAULT.nodes[a].createdOrder??a)-(VAULT.nodes[b].createdOrder??b)), true, true);

}

function formatBytes(bytes) {
  if (!Number.isFinite(bytes) || bytes <= 0) return '—';
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(bytes < 10 * 1024 ? 1 : 0)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function formatNoteDate(ms) {
  if (!Number.isFinite(ms) || ms <= 0) return '—';
  try { return new Date(ms).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
  catch(e) { return '—'; }
}

function extractNoteHeadings(markdown) {
  return (markdown || '').split(/\r?\n/)
    .map(line => line.match(/^(#{1,4})\s+(.+)$/))
    .filter(Boolean)
    .map(m => ({ level:m[1].length, text:m[2].replace(/[#*_`\[\]]/g, '').trim() }))
    .filter(h => h.text)
    .slice(0, 6);
}

function renderNoteInfo(nd, body, connected) {
  const text = (body || '').replace(/```[\s\S]*?```/g, ' ').replace(/!\[[^\]]*\]\([^)]*\)/g, ' ');
  const words = (text.match(/[A-Za-zÀ-ÿ0-9’'-]+/g) || []).length;
  const wikilinks = parseMDLinks(body || '');
  const readMins = words ? Math.max(1, Math.ceil(words / 220)) : 0;
  const cards = [
    ['words', words ? words.toLocaleString() : '—'],
    ['read', readMins ? `${readMins}m` : '—'],
    ['file', formatBytes(nd.size)],
    ['links', `${wikilinks.length}/${Math.max(0, (connected || []).length)}`],
  ].map(([k,v]) => `<span class="note-info-card"><span class="note-info-k">${escapeHtml(k)}</span><span class="note-info-v">${escapeHtml(v)}</span></span>`).join('');
  return `<div class="note-info-grid">${cards}</div>`;
}

function briefMarkdownText(markdown, maxChars = 380) {
  let text = (markdown || '')
    .replace(/^---[\s\S]*?---/, '')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/!\[[^\]]*\]\([^)]*\)/g, ' ')
    .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
    .replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, a, b) => b || a)
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/^>\s?/gm, '')
    .replace(/[*_`~]/g, '')
    .replace(/\r/g, '')
    .split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .slice(0, 5)
    .join(' · ')
    .replace(/\s+/g, ' ')
    .trim();
  if (text.length > maxChars) text = text.slice(0, maxChars).replace(/\s+\S*$/, '') + '…';
  return text;
}


function renderCategoryFileList(ids, categoryId) {
  const noteIds = noteIdsFromSet(ids)
    .filter(x => x !== categoryId && VAULT.nodes[x]?.type !== 'Category')
    .sort((a, b) => (VAULT.nodes[a].createdOrder ?? a) - (VAULT.nodes[b].createdOrder ?? b));
  if (!noteIds.length) return '';
  const shown = noteIds.slice(0, 120).map((nid, idx) => {
    const n = VAULT.nodes[nid];
    const links = Math.max(0, (n.degree || connectedNodeIds(nid).size - 1));
    return `<button class="category-file-btn" data-node-file="${nid}" onmouseenter="setPanelHoverNode(${nid}, true)" onmouseleave="setPanelHoverNode(${nid}, false)" onfocus="setPanelHoverNode(${nid}, true)" onblur="setPanelHoverNode(${nid}, false)" onclick="setPanelHoverNode(${nid}, false); focusOnNode(${nid})"><span class="category-file-num">${String(idx + 1).padStart(2, '0')}</span><span class="category-file-name">${escapeHtml(n.name)}</span><span class="category-file-links">${links} link${links === 1 ? '' : 's'}</span></button>`;
  }).join('');
  const more = noteIds.length > 120 ? `<div class="panel-meta">Showing 120 of ${noteIds.length} files. Use the carousel to continue browsing.</div>` : '';
  return `<div class="note-section"><div class="note-section-title">Files in this node · ${noteIds.length}</div><div class="category-file-list">${shown}</div>${more}</div>`;
}

function simpleMarkdownHtml(md) {
  let text = escapeHtml((md || '').replace(/^---[\s\S]*?---/, '').trim());
  text = text.replace(/^### (.*)$/gm, '<h2>$1</h2>')
             .replace(/^## (.*)$/gm, '<h2>$1</h2>')
             .replace(/^# (.*)$/gm, '<h1>$1</h1>')
             .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">')
             .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
             .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return text.split(/\n{2,}/).map(block => {
    if (/^<h[12]>/.test(block) || /^<img/.test(block) || /^<video/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
}

async function readTextAloud(title, text, event) {
  event?.stopPropagation?.();
  const speakable = (window.getSelection?.().toString() || text || '').trim();
  if (!speakable) return;
  const btn = event?.currentTarget;
  const old = btn?.textContent;
  if (btn) btn.textContent = 'Reading…';
  try {
    if (currentVoiceAudio) { currentVoiceAudio.pause(); currentVoiceAudio = null; }
    const res = await fetch('/api/voice', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ text: `${title ? title + '. ' : ''}${speakable}`.slice(0, 2400), language:currentLang || 'en', mode:'fast' }) });
    if (!res.ok) throw new Error(await res.text());
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentVoiceAudio = new Audio(url);
    currentVoiceAudio.onended = () => URL.revokeObjectURL(url);
    await currentVoiceAudio.play();
  } catch (e) {
    console.warn('[voice] read failed', e);
  } finally {
    if (btn && old) btn.textContent = old;
  }
}

function zoomToCluster() {
  if (nodes2d.length === 0) return;
  const active = nodes2d.filter(nd => activeSet.has(nd.id) || mainSet.has(nd.id));
  if (active.length === 0) {
    fitAllNodes(false);
    return;
  }

  // In local graph mode, center on the main node with neighbors in frame
  if (localGraphMode && centerNodeId != null && nodes2d[centerNodeId]) {
    const center = nodes2d[centerNodeId];
    let minX = center.ox, maxX = center.ox, minY = center.oy, maxY = center.oy;
    active.forEach(nd => {
      if (nd.id === centerNodeId) return;
      minX = Math.min(minX, nd.ox); maxX = Math.max(maxX, nd.ox);
      minY = Math.min(minY, nd.oy); maxY = Math.max(maxY, nd.oy);
    });
    const cx2 = (minX + maxX) / 2;
    const cy2 = (minY + maxY) / 2;
    const w2 = Math.max(maxX - minX, 200) + 260;
    const h2 = Math.max(maxY - minY, 200) + 260;
    const scale = Math.min(W / w2, H / h2, 2.45);
    camTargetZoom = Math.max(1.02, Math.min(scale, 2.25));
    camTargetPan = { x: -cx2, y: -cy2 };
    return;
  }

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  active.forEach(nd => {
    minX = Math.min(minX, nd.ox); maxX = Math.max(maxX, nd.ox);
    minY = Math.min(minY, nd.oy); maxY = Math.max(maxY, nd.oy);
  });
  const cx2 = (minX + maxX) / 2;
  const cy2 = (minY + maxY) / 2;
  const w2 = maxX - minX + 260;
  const h2 = maxY - minY + 260;
  const scale = Math.min(W / w2, H / h2, 1.9);
  camTargetZoom = Math.max(.78, Math.min(scale, 1.72));
  camTargetPan = { x: -cx2, y: -cy2 };

// Track mouse/pointer position for hover detection and press-drag rotation
canvas.addEventListener('pointermove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  if (activePointers.has(e.pointerId)) activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if (isPinching && activePointers.size >= 2) {
    e.preventDefault();
    const dist = pointerDistance();
    if (pinchStartDistance > 0 && dist > 0) {
      const maxZoom = centerNodeId != null ? 8.0 : 5.0;
      userZoomOffset = Math.max(0.16, Math.min(maxZoom, pinchStartZoomOffset * (dist / pinchStartDistance)));
    }
    graphDragMoved = true;
    return;
  }
  if (isDraggingGraph) {
    const dx = e.clientX - lastPointerX;
    const dy = e.clientY - lastPointerY;
    if (Math.abs(dx) + Math.abs(dy) > 1) graphDragMoved = true;
    if (draggedNodeId != null && nodes2d[draggedNodeId]) {
      const nd = nodes2d[draggedNodeId];
      const mx = dx / Math.max(camZoom, .001);
      const my = dy / Math.max(camZoom, .001);
      nd.ox += mx;
      nd.oy += my;
      nd.ox0 += mx * .12;
      nd.oy0 += my * .12;
      VAULT.links.forEach(link => {
        let otherId = null;
        if (link.source === draggedNodeId) otherId = link.target;
        else if (link.target === draggedNodeId) otherId = link.source;
        if (otherId != null && nodes2d[otherId]) {
          const other = nodes2d[otherId];
          const phase = (other.gp || 1);
          const strength = link.kind === 'category' ? .022 : .014;
          other.vx += mx * strength * (0.65 + Math.abs(Math.sin(phase)) * .5);
          other.vy += my * strength * (0.65 + Math.abs(Math.cos(phase)) * .5);
        }
      });
      frameNodeSet(connectedNodeIds(draggedNodeId));
    } else {
      camTargetPan.x += dx / Math.max(camZoom, .001);
      camTargetPan.y += dy / Math.max(camZoom, .001);
      camPan.x += dx / Math.max(camZoom, .001) * .35;
      camPan.y += dy / Math.max(camZoom, .001) * .35;
    }
    lastPointerX = e.clientX;
    lastPointerY = e.clientY;
  }
});

const TITLE_TEXT = 'Mind Vault';
const SHUFFLE_CHARS = '01░▒▓█/\\|+-';
const titleShuffleTimers = new WeakMap();
function shuffleTitle(el, finalText = TITLE_TEXT, appear = true, done = () => {}) {
  if (!el) { done(); return; }
  clearInterval(titleShuffleTimers.get(el));
  let step = 0;
  const max = 20;
  const original = finalText;
  const timer = setInterval(() => {
    const progress = step / max;
    if (appear) {
      const locked = Math.floor(progress * original.length);
      el.textContent = original.split('').map((ch, i) => {
        if (ch === ' ') return ' ';
        return i < locked ? ch : SHUFFLE_CHARS[Math.floor(Math.random() * SHUFFLE_CHARS.length)];
      }).join('');
    } else {
      const remaining = Math.max(0, original.length - Math.floor(progress * original.length));
      el.textContent = original.split('').map((ch, i) => {
        if (i >= remaining || ch === ' ') return i >= remaining ? '' : ' ';
        return SHUFFLE_CHARS[Math.floor(Math.random() * SHUFFLE_CHARS.length)];
      }).join('');
    }
    step++;
    if (step > max) {
      clearInterval(timer);
      el.textContent = appear ? original : '';
      done();
    }
  }, 34);
  titleShuffleTimers.set(el, timer);
}

function drawAsciiOpening() {
  return;
  if (!asciiOpeningActive) return;
  const c = document.getElementById('asciiCanvas');
  if (!c) return;
  const a = c.getContext('2d');
  if (c.width !== W || c.height !== H) { c.width = W; c.height = H; }
  const age = (performance.now() - asciiOpeningStartedAt) / 1000;
  const fadeIn = Math.min(1, age / .8);
  const fadeOut = Math.max(0, 1 - Math.max(0, age - 4.8) / 2.2);
  const alpha = fadeIn * fadeOut;
  c.style.opacity = String(Math.min(.36, alpha * .36));
  a.clearRect(0, 0, W, H);
  if (alpha <= .01) {
    if (age > 7.2) { asciiOpeningActive = false; c.style.opacity = '0'; }
    return;
  }
  const chars = ['·','∙','─','╱','╲','┈','◇','⟡'];
  const cols = Math.ceil(W / 22);
  const rows = Math.ceil(H / 26);
  const cx0 = cols / 2, cy0 = rows / 2;
  a.font = '12px SF Mono, ui-monospace, Menlo, monospace';
  a.textAlign = 'center';
  a.textBaseline = 'middle';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const dx = x - cx0, dy = y - cy0;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const wave = age * 8 - dist;
      if (wave < -2 || wave > 13) continue;
      const local = Math.max(0, 1 - Math.abs(wave - 4.5) / 8.5) * alpha;
      if (local < .06) continue;
      const idx = Math.abs(Math.floor(Math.sin(x * 12.989 + y * 78.23 + age * 5) * 9999)) % chars.length;
      a.fillStyle = `rgba(214,205,194,${local * .42})`;
      a.fillText(chars[idx], x * 22 + 11, y * 26 + 13);
    }
  }
}

// VOICE CALL SYSTEM — Gemini Live
let ws = null;
let audioCtx = null;
let micStream = null;
let _pendingMicStream = null;
let micProcessor = null;
let isInCall = false;
let callStarting = false;
let isRecording = false;
let playbackQueue = [];  // Scheduled audio buffers for gapless playback
let nextPlayTime = 0;   // When the next buffer should start
let gainNode = null;
let shouldGreetOnConnect = false;
let voiceAmplitudes = new Float32Array(64).fill(0);

function initAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  }
  // Resume on every interaction — Safari suspends until user gesture.
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

function unlockAudioNow() {
  try {
    const ctx = initAudioCtx();
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  } catch(e) {}
}

['pointerdown','touchstart','keydown'].forEach(evt => {
  window.addEventListener(evt, unlockAudioNow, { passive:true, once:false });
});

function playPCMFloat32(float32Array) {
  const ctx = initAudioCtx();
  // iOS Safari: resume on every playback attempt
  if (ctx.state === 'suspended') ctx.resume();
  if (!gainNode) {
    gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(1.0, ctx.currentTime);
    gainNode.connect(ctx.destination);
  }
  
  const buffer = ctx.createBuffer(1, float32Array.length, 24000);
  buffer.getChannelData(0).set(float32Array);
  
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(gainNode);
  
  // Schedule gapless: start exactly where the last one ends
  const now = ctx.currentTime;
  // If too much time since last buffer, reset timing (avoids stale schedule on iOS)
  if (nextPlayTime < now - 0.3) nextPlayTime = 0;
  const startTime = Math.max(now + 0.02, nextPlayTime);
  source.start(startTime);
  nextPlayTime = startTime + buffer.duration;
  // Waveform animation handled by mic-side interval in startCall()
}

function drawWaveform() {
  const canvas = document.getElementById('waveCanvas');
  const line = document.getElementById('waveLine');
  if (!canvas || !line) return;
  const rect = line.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!isInCall) return;
  const midY = canvas.height / 2;
  ctx.beginPath();
  ctx.strokeStyle = isRecording ? 'rgba(90,212,112,0.6)' : 'rgba(154,139,122,0.4)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < voiceAmplitudes.length; i++) {
    const x = (i / voiceAmplitudes.length) * canvas.width;
    const amp = voiceAmplitudes[i] * midY * 0.85;
    if (i === 0) ctx.moveTo(x, midY - amp);
    else ctx.lineTo(x, midY - amp);
  }
  ctx.stroke();
  ctx.beginPath();
  ctx.strokeStyle = isRecording ? 'rgba(90,212,112,0.35)' : 'rgba(154,139,122,0.25)';
  for (let i = 0; i < voiceAmplitudes.length; i++) {
    const x = (i / voiceAmplitudes.length) * canvas.width;
    const amp = voiceAmplitudes[i] * midY * 0.85;
    if (i === 0) ctx.moveTo(x, midY + amp);
    else ctx.lineTo(x, midY + amp);
  }
  ctx.stroke();
}

function animateWaveform() {
  drawWaveform();
  if (isInCall) requestAnimationFrame(animateWaveform);
}

function connectGemini() {
  return new Promise((resolve, reject) => {
    try {
      ws = new WebSocket(GEMINI_WS);
    } catch(e) { reject(e); return; }
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => { console.log('[gemini] Connected'); resolve(ws); };
    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        try { handleGeminiMessage(JSON.parse(event.data)); } catch(e) {}
      } else if (event.data instanceof ArrayBuffer) {
        const view = new DataView(event.data);
        if (view.getUint32(0) === 1) {
          const floatView = new Float32Array(event.data, 12);
          playPCMFloat32(floatView);
        }
      }
    };
    ws.onerror = (e) => { console.error('[gemini] WS error', e); };
    ws.onclose = () => {
      console.log('[gemini] Disconnected');
      ws = null;
      if (isInCall) endCall();
    };
  });
}

let pendingConceptTimer = null;
let pendingConceptText = '';
function scheduleConceptFocus(text, delay = 650) {
  const lower = (text || '').toLowerCase();
  if (activePanelNodeId != null && /(marp|deck|slides?|presentation|présentation|diapo|diapos)/i.test(lower)) {
    const nd = VAULT.nodes[activePanelNodeId];
    if (nd && nd.type !== 'Category') openMarpDeck(activePanelNodeId);
  }
  pendingConceptText = text || pendingConceptText;
  clearTimeout(pendingConceptTimer);
  pendingConceptTimer = setTimeout(() => {
    driftCameraToTranscript(pendingConceptText);
    pendingConceptText = '';
  }, delay);
}

function panelHasActiveFinding() {
  return activePanelNodeId != null && document.getElementById('respPanel')?.classList.contains('visible');
}

function handleGeminiMessage(msg) {
  if (msg.type === 'connected') {
    console.log(`[gemini] Session: voice=${msg.voice}, notes=${msg.vault_notes || '?'}`);
    shouldGreetOnConnect = false;
  } else if (msg.type === 'transcript') {
    addTranscriptToChat(msg.text, msg.speaker === 'user' ? 'user' : 'gemini');
    pendingConceptText = `${pendingConceptText} ${msg.text || ''}`.trim();
  } else if (msg.type === 'turn_complete') {
    console.log('[gemini] Turn complete');
    if (!panelHasActiveFinding()) scheduleConceptFocus(pendingConceptText, 80);
    else pendingConceptText = '';
  } else if (msg.type === 'rag_context') {
    console.log(`[gemini] RAG: ${msg.sources?.length || 0} sources`);
    if (msg.sources && msg.sources.length > 0) {
      highlightRAGSources(msg.sources);
      if (!panelHasActiveFinding()) driftCameraToSources(msg.sources);
    }
  } else if (msg.type === 'error') {
    console.error('[gemini] Error:', msg.message);
    addSystemMessage('Connection error: ' + msg.message);
  }
}

// ══════════════════════════════════════════════
// CAMERA DRIFT — pan to mentioned nodes during conversation
// ══════════════════════════════════════════════
function driftCameraToSources(sources) {
  if (panelHasActiveFinding()) return;
  for (const src of sources) {
    const name = src.split('/').pop().replace('.md', '');
    for (let i = 0; i < VAULT.noteCount; i++) {
      if (VAULT.nodes[i].name === name && nodes2d[i]) {
        activateLocalGraph(i);
        return;
      }
    }
  }
}

function driftCameraToTranscript(text) {
  if (panelHasActiveFinding()) return;
  const lower = (text || '').toLowerCase();
  const words = lower.split(/[^a-z0-9]+/).filter(w => w.length > 2);

  // Categories first: "research" should bring the Research hub forward.
  for (let i = VAULT.noteCount; i < VAULT.nodes.length; i++) {
    const nd = VAULT.nodes[i];
    if (!nd || !nd.name) continue;
    const name = nd.name.toLowerCase();
    if (lower.includes(name) || words.some(w => name.includes(w))) {
      activateLocalGraph(i);
      return;
    }
  }

  // Then precise note names / meaningful title words.
  let bestId = -1;
  let bestScore = 0;
  for (let i = 0; i < VAULT.noteCount; i++) {
    const nd = VAULT.nodes[i];
    if (!nd || !nd.name) continue;
    const name = nd.name.toLowerCase();
    let score = lower.includes(name) ? 10 : 0;
    const titleWords = name.split(/[^a-z0-9]+/).filter(w => w.length > 3);
    for (const w of titleWords) if (words.includes(w)) score += 2;
    if (score > bestScore) { bestScore = score; bestId = i; }
  }
  if (bestId >= 0 && bestScore >= 2 && nodes2d[bestId]) activateLocalGraph(bestId);
}


function activateLocalGraph(centerId) {
  focusOnNode(centerId);
}

let lastBotMsg = null;
let lastUserMsg = null;

function addTranscriptToChat(text, speaker) {
  const panel = document.getElementById('nodesPanel');
  panel.style.display = 'none';
  driftCameraToTranscript(text);
  return;
  
  if (speaker === 'gemini') {
    // Fade out old message, keep it until new one is visible
    const oldMsg = lastBotMsg;
    if (oldMsg) oldMsg.classList.add('fading');
    lastBotMsg = document.createElement('div');
    lastBotMsg.className = 'chat-a';
    lastBotMsg.textContent = text;
    panel.appendChild(lastBotMsg);
    requestAnimationFrame(() => {
      lastBotMsg.classList.add('visible');
      // Remove old message after new one is visible
      if (oldMsg) setTimeout(() => oldMsg.remove(), 400);
    });
  } else if (speaker === 'user') {
    const oldMsg = lastUserMsg;
    if (oldMsg) oldMsg.classList.add('fading');
    lastUserMsg = document.createElement('div');
    lastUserMsg.className = 'chat-q';
    lastUserMsg.textContent = text;
    panel.appendChild(lastUserMsg);
    requestAnimationFrame(() => {
      lastUserMsg.classList.add('visible');
      if (oldMsg) setTimeout(() => oldMsg.remove(), 400);
    });
  }
}

function playToneCluster({ notes, duration = 1.2, volume = .22, type = 'sine', drift = 1.02, spread = .06, filterStart = 500, filterEnd = 1800 }) {
  try {
    const ctx = initAudioCtx();
    const now = ctx.currentTime + 0.006;
    const master = ctx.createGain();
    const compressor = ctx.createDynamicsCompressor();
    master.gain.setValueAtTime(volume, now);
    master.gain.exponentialRampToValueAtTime(0.001, now + duration + .18);
    master.connect(compressor);
    compressor.connect(ctx.destination);

    notes.forEach((freq, i) => {
      const t0 = now + i * spread;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = Array.isArray(type) ? type[i % type.length] : type;
      osc.frequency.setValueAtTime(freq, t0);
      osc.frequency.exponentialRampToValueAtTime(freq * drift, t0 + duration * .72);
      filter.type = 'lowpass';
      filter.Q.setValueAtTime(.7, t0);
      filter.frequency.setValueAtTime(filterStart + i * 90, t0);
      filter.frequency.exponentialRampToValueAtTime(filterEnd + i * 150, t0 + duration * .68);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.linearRampToValueAtTime(0.72 / Math.sqrt(i + 2), t0 + Math.min(.16, duration * .18));
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
      osc.connect(filter); filter.connect(gain); gain.connect(master);
      osc.start(t0); osc.stop(t0 + duration + .08);
    });
  } catch(e) { /* decorative sound never blocks UI */ }
}

function focusVaultNodes(query) {
  // Highlight nodes matching the query immediately (before RAG returns)
  const q = query.toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length > 2);
  for (let i = VAULT.noteCount; i < VAULT.nodes.length; i++) {
    const node = VAULT.nodes[i];
    if (node && node.name && words.some(w => node.name.toLowerCase().includes(w))) {
      focusOnNode(i);
      return;
    }
  }
  
  for (let i = 0; i < VAULT.noteCount; i++) {
    const node = VAULT.nodes[i];
    if (!node || !node.name) continue;
    const name = node.name.toLowerCase();
    const matches = words.some(w => name.includes(w));
    if (matches) {
      focusOnNode(i);
      return;
    }
  }
}

let speechRec = null;
function handleVoiceCommandText(text) {
  const field = document.getElementById('inputField');
  if (field) field.value = text;
  const lower = (text || '').toLowerCase();
  if (/(stop|hang up|disconnect)/.test(lower)) { endCall(); return; }
  if (/(close|dismiss|hide|go back)/.test(lower)) { closeMarpDeck(); document.getElementById('respPanel')?.classList.remove('visible'); document.getElementById('panelFooter')?.style && (document.getElementById('panelFooter').style.display='none'); return; }
  if (activePanelNodeId != null && /(summarise|summarize|summary)/.test(lower)) { summarizeNode(activePanelNodeId); return; }
  if (activePanelNodeId != null && /(marp|deck|slide|presentation)/.test(lower)) { openMarpDeck(activePanelNodeId); return; }
  if (activePanelNodeId != null && /(read|document|open)/.test(lower)) { openInfoPage(activePanelNodeId); return; }
  if (/(find|search|open)/.test(lower)) { focusVaultNodes(text); return; }
  queryVault(text);
}

async function toggleCall() {
  if (callStarting || isInCall || speechRec) {
    playDisconnectSound();
    callStarting = false;
    endCall();
    return;
  }
  callStarting = true;
  playConnectionSound();
  const field = document.getElementById('inputField');
  const line = document.getElementById('waveLine');
  document.getElementById('bottomInput')?.classList.add('visible');
  line?.classList.add('active');
  if (field) { field.placeholder = 'Listening…'; field.focus(); }

  const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (Recognition) {
    const rec = new Recognition();
    speechRec = rec;
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = currentLang === 'fr' ? 'fr-FR' : 'en-AU';
    rec.onstart = () => { callStarting = false; isInCall = true; animateEntropyConnect(); };
    rec.onresult = (event) => {
      let interim = '', finalText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const txt = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalText += txt; else interim += txt;
      }
      if (field) field.value = (finalText || interim || '').trim();
      if (finalText.trim()) {
        const text = finalText.trim();
        handleVoiceCommandText(text);
      }
    };
    rec.onerror = e => { console.warn('[speech]', e.error); };
    rec.onend = () => { if (isInCall && speechRec === rec) { try { rec.start(); } catch(e) {} } };
    try { rec.start(); } catch(e) { callStarting = false; addSystemMessage('Speech recognition could not start.'); }
    return;
  }

  // Fallback: mic permission + visual pulse only.
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true } });
    if (!callStarting) { stream.getTracks().forEach(t => t.stop()); return; }
    _pendingMicStream = stream;
    startCall();
  } catch(e) {
    callStarting = false;
    line?.classList.remove('active');
    addSystemMessage('Microphone access was denied.');
  }
}

function startCall() {
  // Resume AudioContext on user gesture — Safari/macOS/iOS requires this
  // This must be called DIRECTLY from a user tap (onclick) — not from setTimeout.
  // iOS Safari will silently refuse getUserMedia if the gesture chain is broken.
  const ctx = initAudioCtx();
  if (ctx.state === 'suspended') {
    // resume() returns a promise — must await before proceeding on iOS
    ctx.resume().then(() => {
      _actuallyStartCall();
    });
    return;
  }
  _actuallyStartCall();
}

function _actuallyStartCall() {
  
  const line = document.getElementById('waveLine');
  const field = document.getElementById('inputField');
  
  line.classList.add('active');
  field.placeholder = 'On a call...';
  
  callStarting = false;
  isInCall = true;
  voiceAmplitudes.fill(0);
  
  // Animate entropy: scattered dots → ordered signal
  animateEntropyConnect();
  
  // Use pre-granted mic stream (from toggleCall) or request fresh
  const getMicStream = _pendingMicStream
    ? Promise.resolve(_pendingMicStream)
    : navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true } });
  _pendingMicStream = null;
  
  // Start mic
  getMicStream
    .then(stream => {
      micStream = stream;
      const ctx = initAudioCtx();
      const source = ctx.createMediaStreamSource(stream);
      const processor = ctx.createScriptProcessor(4096, 1, 1);
      micProcessor = processor;
      
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 128;
      source.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      function tick() {
        if (!isInCall) return;
        analyser.getByteFrequencyData(data);
        for (let i = 0; i < voiceAmplitudes.length; i++) {
          const idx = Math.floor(i * data.length / voiceAmplitudes.length);
          voiceAmplitudes[i] = voiceAmplitudes[i] * 0.5 + (data[idx] / 255) * 0.5;
        }
      }
      setInterval(tick, 50);
      animateWaveform();
      
      processor.onaudioprocess = (e) => {
        if (!isInCall || !ws || ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        const resampled = resampleFloat32(float32, ctx.sampleRate, 16000);
        const int16 = float32ToInt16(resampled);
        
        const header = new ArrayBuffer(12);
        const view = new DataView(header);
        view.setUint32(0, 0); // type: mic audio
        view.setUint32(4, float32.byteLength);
        view.setUint32(8, ctx.sampleRate);
        ws.send(new Uint8Array([...new Uint8Array(header), ...new Uint8Array(float32.buffer)]));
      };
      
      source.connect(processor);
      // iOS Safari requires processor connected to destination for onaudioprocess to fire.
      // Use a zero-gain node to prevent mic audio from playing through speakers.
      const silentGain = ctx.createGain();
      silentGain.gain.setValueAtTime(0, ctx.currentTime);
      processor.connect(silentGain);
      silentGain.connect(ctx.destination);
      
      // Activity markers removed — Gemini Live raw WS doesn't need them
    })
    .catch(err => {
      console.error('Mic error:', err);
      addSystemMessage('Microphone access denied.');
      endCall();
    });
}

function endCall() {
  callStarting = false;
  isInCall = false;
  if (speechRec) { try { speechRec.stop(); } catch(e) {} speechRec = null; }
  const line = document.getElementById('waveLine');
  const field = document.getElementById('inputField');
  
  line.classList.remove('active', 'speaking');
  field.placeholder = '';
  
  // Animate entropy: ordered → scattered
  animateEntropyDisconnect();
  
  if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
  if (_pendingMicStream) { _pendingMicStream.getTracks().forEach(t => t.stop()); _pendingMicStream = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  // Reset playback timing
  nextPlayTime = 0;
  
  // Activity markers removed — Gemini Live raw WS doesn't use them
  if (ws) { try { ws.close(); } catch(e) {} ws = null; }
  
  voiceAmplitudes.fill(0);
  drawWaveform();
}

function resampleFloat32(data, fromRate, toRate) {
  if (fromRate === toRate) return data;
  const ratio = toRate / fromRate;
  const newLength = Math.round(data.length * ratio);
  const result = new Float32Array(newLength);
  for (let i = 0; i < newLength; i++) {
    const srcIdx = i / ratio;
    const idx = Math.floor(srcIdx);
    const frac = srcIdx - idx;
    if (idx + 1 < data.length) result[i] = data[idx] * (1 - frac) + data[idx + 1] * frac;
    else result[i] = data[Math.min(idx, data.length - 1)];
  }
  return result;
}

function float32ToInt16(float32) {
  const int16 = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
  }
  return int16;
}
